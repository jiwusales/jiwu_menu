<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物寶寶目錄</title>
  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  
  <style>
    /* -------------------------------------------
       1. 公版外觀設定
       ------------------------------------------- */
    :root { 
      --theme-color: #f2c2d5; 
      --nav-bg: #f9f9f9;      
      --text-color: #333333;  
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; }
    .top-bar { background: var(--theme-color); color: #fff; padding: 10px 0; position: fixed; top: 0; left: 0; width: 100%; z-index: 999; font-size: 15px; }
    .top-bar .pulse-text { display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    
    /* 角色轉跳 Bar & 種類篩選 Bar 共通樣式 */
    .nav-bar-wrapper, .filter-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; }
    .nav-bar-wrapper { height: 38px; border-bottom: 1px solid #f0f0f0; }
    .filter-bar-wrapper { height: 30px; background: #fff; }

    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* 角色 Bar 字體 */
    .nav-bar { display: inline-block; padding: 8px 0; font-size: 10pt; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 0; display: inline-block; transition: 0.2s; }
    .nav-bar a::after { content: "｜"; color: #aaa; margin: 0 2px; }
    .nav-bar a:last-child::after { content: ""; }

    /* 種類複選按鈕 */
    .filter-item { 
      display: inline-flex; 
      align-items: center; 
      margin: 0 8px; 
      font-size: 10px; 
      cursor: pointer; 
      color: #666;
      vertical-align: middle;
    }
    .filter-item input { margin-right: 3px; cursor: pointer; accent-color: var(--theme-color); transform: scale(0.8); }

    .nav-arrow { width: 24px; font-size: 16px; cursor: pointer; flex-shrink: 0; user-select: none; color: #bbb; display: flex; justify-content: center; align-items: center; }

    /* 調整內容區塊頂距 */
    #card-container { padding: 115px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    
    .type-divider { display: flex; align-items: center; justify-content: center; margin: 15px 0 8px; font-weight: bold; scroll-margin-top: 120px; color: var(--text-color); font-size: 16px; }
    .type-divider::before, .type-divider::after { content: ""; flex: 1; border-top: 1px solid #ddd; margin: 0 10px; }

    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); justify-content: start; gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
    .stock-tag { position: absolute; top: 4px; left: 4px; background-color: #fab460; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto 12px; object-fit: contain; pointer-events: none; }
    .card .name { margin: 1px auto; font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; }
    .card .price { font-size: 10px; margin: 1px auto 5px; color: #666; }

    .card-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .card-overlay .card { transform: scale(3.2); background: white; width: 120px; pointer-events: none; border-width: 1.5px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="https://lin.ee/X6FUFI9" target="_blank" style="color: #fff; text-decoration: none;">
      <span class="pulse-text" id="top-msg">載入中...</span>
    </a>
  </div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper" id="role-nav-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="role-scroll">
        <div class="nav-bar" id="dynamic-nav"></div>
      </div>
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(150,0)">❯</div>
    </div>
    <div class="filter-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="filter-scroll">
        <div id="filter-bar" style="display: inline-block; padding: 5px 0;"></div>
      </div>
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(150,0)">❯</div>
    </div>
  </div>

  <div id="card-container"></div>

<script>
/* -------------------------------------------
    2. 資料與邏輯
   ------------------------------------------- */
const CONFIG = {
  SHEET_ID: "1iCEqgnGGa_TVVbx90xNWxDzwKtz94VfqF8IsXRvpKMY", 
  SHEET_NAME: "ちいかわ樂園", 
  TOP_BAR_TEXT: "點擊卡片可放大圖片唷！訂購找花花 (৹˙꒳˙ฅ )"
};

let allItems = [];
let allCategories = []; 
let allTypes = [];      
let selectedTypes = []; 

document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;

function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
  fetch(url).then(r => r.text()).then(t => {
    try {
      const data = JSON.parse(t.substr(47).slice(0,-2));
      const rows = data.table.rows;
      
      allItems = rows.map(r => ({
        kind: (r.c[0]?.v || "其他角色").toString().trim(),
        type: (r.c[1]?.v || "其他").toString().trim(), 
        name: r.c[3]?.v || "", 
        price: r.c[5]?.v, 
        stock: r.c[6]?.v, 
        img: r.c[12]?.v || "https://i.postimg.cc/bv5xRs04/image.png"
      })).filter(item => item.stock?.toString().toLowerCase() !== 'x');

      allCategories = [...new Set(allItems.map(i => i.kind))];
      allTypes = [...new Set(allItems.map(i => i.type))];
      selectedTypes = [...allTypes]; 

      renderRoleNav();
      renderFilters();
      renderItems();
    } catch (e) {
      document.getElementById('card-container').innerHTML = "載入失敗，請確認資料。";
    }
  });
}

function renderRoleNav() {
  const nav = document.getElementById('dynamic-nav');
  nav.innerHTML = allCategories.map(cat => `<a href="#${cat}">${cat}</a>`).join('');
}

function renderFilters() {
  const filterBar = document.getElementById('filter-bar');
  let html = `<label class="filter-item"><input type="checkbox" ${selectedTypes.length === allTypes.length ? 'checked' : ''} onchange="toggleAll(this)">全選</label>`;
  html += allTypes.map(t => `<label class="filter-item"><input type="checkbox" ${selectedTypes.includes(t) ? 'checked' : ''} onchange="toggleType('${t}')">${t}</label>`).join('');
  filterBar.innerHTML = html;
}

function toggleAll(el) {
  selectedTypes = el.checked ? [...allTypes] : [];
  renderFilters();
  renderItems();
}

function toggleType(type) {
  if (selectedTypes.includes(type)) {
    selectedTypes = selectedTypes.filter(t => t !== type);
  } else {
    selectedTypes.push(type);
  }
  renderFilters();
  renderItems();
}

function renderItems() {
  const container = document.getElementById('card-container');
  const roleNav = document.getElementById('role-nav-wrapper');
  container.innerHTML = "";

  const isFullSelection = (selectedTypes.length === allTypes.length);
  const filteredItems = allItems.filter(i => selectedTypes.includes(i.type));

  roleNav.style.display = isFullSelection ? "flex" : "none";
  container.style.paddingTop = isFullSelection ? "115px" : "80px";

  if (filteredItems.length === 0) {
    container.innerHTML = "<div style='padding: 20px; color: #999;'>沒有勾選任何種類唷</div>";
    return;
  }

  if (isFullSelection) {
    allCategories.forEach(cat => {
      const catItems = filteredItems.filter(i => i.kind === cat);
      if (catItems.length === 0) return;
      const divider = document.createElement('div');
      divider.className = 'type-divider';
      divider.id = cat;
      divider.textContent = cat;
      container.appendChild(divider);
      const grid = document.createElement('div');
      grid.className = 'group-grid';
      catItems.forEach(item => grid.appendChild(createCard(item)));
      container.appendChild(grid);
    });
  } else {
    const grid = document.createElement('div');
    grid.className = 'group-grid';
    grid.style.paddingTop = "10px";
    filteredItems.forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  }
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  const stockNum = parseFloat(item.stock);
  const stockTagHtml = (!isNaN(stockNum) && stockNum > 0) ? `<div class="stock-tag">現</div>` : "";
  let displayPrice = "";
  if (item.price === '-') { displayPrice = "組合出售"; }
  else if (!item.price) { displayPrice = "私訊花花"; }
  else {
    const priceStr = item.price.toString().trim();
    const isPureNumber = /^[0-9]+$/.test(priceStr);
    displayPrice = isPureNumber ? `$${priceStr}` : priceStr;
  }
  card.innerHTML = `${stockTagHtml}<img src="${item.img}"><div class="name">${formatName(item.name)}</div><div class="price">${displayPrice}</div>`;
  card.onclick = () => zoomCard(card);
  return card;
}

function formatName(name) {
  if (!name) return "";
  const cleanName = name.trim();
  if (cleanName.length <= 9) return cleanName;
  return cleanName.slice(0, 9) + "<br>" + cleanName.slice(9);
}

function zoomCard(card) {
  const ov = document.createElement('div');
  ov.className = 'card-overlay';
  const clone = card.cloneNode(true);
  ov.appendChild(clone);
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
}

loadData();
</script>
</body>
</html>
