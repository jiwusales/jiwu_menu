<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <script>
    const CONFIG = {
      THEME_COLOR: "#4f5474",
      ACTIVE_COLOR: "#556890",
      SHEET_ID: "1iCEqgnGGa_TVVbx90xNWxDzwKtz94VfqF8IsXRvpKMY", 
      SHEET_NAME: new URLSearchParams(window.location.search).get('sheet') || "小白虎黑虎蝦",                                     
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！ (৹˙꒳˙ฅ )",
      FAVICON: "https://i.postimg.cc/3R7nNT0k/icon.png",
      LINE_ID: "@jiwusales", 
      LINE_LINK: "https://line.me/R/ti/p/@tei8245t",
      LINE_MSG_URL: "https://line.me/R/oaMessage/@tei8245t/?",
      DEPLOY_URL: "https://script.google.com/macros/s/AKfycbzEaZqaGT4HU2sWDUIiBLQ2TljlaW4YCeupcd_yVf0AlboFATxXSKpkwUwfUWbTuovGKA/exec"
    };
  </script>

  <style>
    :root { 
      --theme-color: #4f5474; 
      --active-color: #556890;
      --nav-bg: #f9f9f9; 
      --text-color: #333333; 
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    
    .top-bar { 
      background: var(--theme-color); 
      color: #fff; 
      padding: 10px 0; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      z-index: 999; 
      font-size: 15px; 
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .top-bar .menu-btn { 
      position: absolute; 
      left: 15px; 
      color: #fff; 
      font-size: 20px; 
      cursor: pointer; 
    }
    .top-bar .pulse-text { display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 38px; border-bottom: 1px solid #f0f0f0; }
    
    #side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: #fff; z-index: 10001; transition: 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); text-align: left; }
    #side-menu.open { left: 0; }
    
    .menu-header { padding: 10px; background: var(--theme-color); color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
    .header-icon { 
      width: 28px; 
      height: 28px; 
      object-fit: contain; 
      margin-right: 10px; 
    }

    .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; color: #555; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .menu-item img { width: 36px; height: 36px; object-fit: contain; }
    .menu-item:active { background: #f9f9f9; }
    #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000; display: none; }

    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .nav-bar { display: inline-block; padding: 8px 0; font-size: 10pt; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 0; display: inline-block; transition: 0.2s; cursor: pointer; }
    .nav-bar a.active-role { font-weight: bold; }
    .nav-bar a::after { content: "｜"; color: #aaa; margin: 0 2px; font-weight: normal; }
    .nav-bar a:last-child::after { content: ""; }

    .filter-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 30px; background: #fff; }
    .filter-item { display: inline-flex; align-items: center; margin: 0 4px; font-size: 12px; cursor: pointer; color: #666; vertical-align: middle; transition: color 0.2s; }
    .filter-item.active { color: var(--active-color); font-weight: bold; }
    .filter-item input { margin-right: 3px; cursor: pointer; accent-color: var(--active-color); transform: scale(0.8); }

    .nav-arrow { width: 24px; font-size: 16px; cursor: pointer; flex-shrink: 0; user-select: none; color: #bbb; display: flex; justify-content: center; align-items: center; }

    #card-container { padding: 115px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    .type-divider { display: flex; align-items: center; justify-content: center; margin: 15px 0 8px; font-weight: bold; scroll-margin-top: 120px; color: var(--text-color); font-size: 16px; }
    .type-divider::before, .type-divider::after { content: ""; flex: 1; border-top: 1px solid #ddd; margin: 0 10px; }
    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); justify-content: start; gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
    .stock-tag { position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; }
    .add-btn-tag { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: #ddd; color: #fff; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; cursor: pointer; pointer-events: auto; transition: none; }

    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto 0px; object-fit: contain; pointer-events: none; }
    .card .name { margin: 1px auto; font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; }
    .card .price { font-size: 10px; margin: 1px auto 5px; color: #666; }
    
    /* ... 略過其餘 CSS 樣式 ... */
    #cart-trigger { position: fixed; top: 115px; right: 15px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; opacity: 0.8; cursor: move; touch-action: none; user-select: none; transition: left 0.3s ease, right 0.3s ease; }
    #cart-trigger img { width: 28px; height: 28px; pointer-events: none; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; font-weight: bold; }
    #cart-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
    .cart-header { padding: 12px 15px; background: #b8a597; color: white; font-weight: bold; font-size: 16px; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .cart-list { flex: 1; overflow-y: auto; padding: 10px; text-align: left; }
    .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; font-size: 12px; }
    .cart-item img { width: 45px; height: 45px; object-fit: contain; border-radius: 4px; }
    .cart-item-info { flex: 1; }
    .cart-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; color: white; margin-bottom: 3px; font-weight: bold; }
    .cart-footer { padding: 15px 15px 25px; border-top: 1px solid #eee; background: #fafafa; }
    .text-clear { display: block; text-align: left; color: #aaa; font-size: 13px; text-decoration: underline; cursor: pointer; margin-bottom: 12px; font-weight: normal; }
    .btn-checkout { background: #b8a597; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
    #checkout-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: white; width: 85%; max-width: 380px; border-radius: 15px; padding: 20px; position: relative; }
    .input-box { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
    .summary-box { background: #f9f9f9; padding: 10px; border-radius: 5px; font-size: 12px; max-height: 250px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #eee; }
    .qr-box { display: none; text-align: center; }
    .qr-box img { width: 180px; height: 180px; margin: 10px 0; }
    .card-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .card-overlay .card { transform: scale(3.1); background: white; width: 100px; padding: 15px 0 5px; pointer-events: none; border-width: 1.5px; }
    .card-overlay .stock-tag { transform: scale(0.6); transform-origin: top left; writing-mode: horizontal-tb !important; width: auto !important; height: 16px !important; padding: 0 5px !important; border-radius: 4px !important; top: 3px; left: 3px; font-size: 10px; }
    .card-overlay .add-btn-tag { transform: scale(0.8); transform-origin: center; } 
  </style>
</head>
<body>
 <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <span class="pulse-text" id="top-msg" style="color: #fff;">載入中...</span>
  </div>

  <div id="menu-overlay" onclick="toggleMenu(false)"></div>
  <div id="side-menu">
    <a href="?sheet=主頁" class="menu-header">
      <img src="https://i.postimg.cc/TPBCSXmJ/she-jiaoicon-W.png" class="header-icon"> JIWU．吉物販售
    </a>
    
    <a href="?sheet=吉伊卡哇" class="menu-item">
      <img src="https://i.postimg.cc/MHGy2vVz/12-2025xia-ri-1.png"> 吉伊卡哇
    </a>
    <a href="?sheet=ちいかわ樂園" class="menu-item">
      <img src="https://i.postimg.cc/50PqVSdK/ckwp-icon.png"> 吉伊卡哇樂園
    </a>
    <a href="?sheet=Nagano白熊" class="menu-item">
      <img src="https://i.postimg.cc/hP8v81NH/icon019.png"> Nagano白熊
    </a>
    <a href="?sheet=小白虎與黑虎蝦" class="menu-item">
      <img src="https://i.postimg.cc/sXB1pdRc/icon020.png"> 小白虎與黑虎蝦
    </a>
  </div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="role-scroll"><div class="nav-bar" id="dynamic-nav"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(150,0)">❯</div>
    </div>
    <div class="filter-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="filter-scroll"><div id="filter-bar" style="display: inline-block;"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(150,0)">❯</div>
    </div>
  </div>

  <div id="card-container"></div>

  <div id="cart-trigger">
    <img src="https://images.icon-icons.com/2098/PNG/512/shopping_cart_icon_128753.png" alt="cart">
    <div id="cart-badge">0</div>
  </div>

  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header">
      <span>購物車</span>
      <span style="cursor:pointer; font-size: 20px;" onclick="toggleCart(false)">✕</span>
    </div>
    <div class="cart-list" id="cart-list"></div>
    <div class="cart-footer">
      <span class="text-clear" onclick="clearCart()">清空購物車</span>
      <div style="margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between; font-size:15px;">
        <span>總計金額</span>
        <span id="cart-total" style="color: #e44d26;">$0</span>
      </div>
      <button class="btn-checkout" onclick="handleCheckoutEntry()">確認結帳</button>
    </div>
  </div>

  <div id="checkout-modal">
    <div class="modal-content" id="step-1">
      <h3 style="margin-top:0; font-size: 18px;">確認訂購資料</h3>
      <div class="summary-box" id="modal-summary-list"></div>
      <div style="padding: 5px 0; border-top: 1px solid #eee; margin-bottom: 5px; text-align: right; font-weight: bold; font-size: 14px;">
        總計：<span id="modal-total-price" style="color:#e44d26;">$0</span>
      </div>
      <input type="text" id="user-line" class="input-box" placeholder="LINE名稱 (必填)">
      <input type="text" id="user-ig" class="input-box" placeholder="其他聯繫方式（IG或Threads帳號）">
      <button class="btn-checkout" id="send-btn" onclick="handleFinalCheckout()">確認訂購</button>
      <span onclick="closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; color:#ccc">✕</span>
    </div>

    <div class="modal-content qr-box" id="step-2">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://line.me/R/ti/p/@tei8245t" alt="QR">
      <p style="font-weight:bold; font-size: 14px; margin: 10px 0;">請至官LINE核對訂單資料，感謝你 (๑•̀∀•́ฅ ✧ </p>
      <button class="btn-checkout" style="margin-top:15px;" onclick="closeModal()">關閉視窗</button>
    </div>
  </div>

<script>
document.documentElement.style.setProperty('--theme-color', CONFIG.THEME_COLOR);
document.documentElement.style.setProperty('--active-color', CONFIG.ACTIVE_COLOR);
document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;

let allItems = [], allCategories = [], allTypes = [], selectedTypes = [], selectedRole = null;
let cart = JSON.parse(localStorage.getItem('jiwu_cart')) || [];

// ... 略過 toggleMenu, loadData, saveCart, addToCart, clearCart, toggleCart, updateCartUI, removeFromCart, generateLineMessage, handleCheckoutEntry, openCheckoutModal, renderCheckoutSummary, closeModal, handleFinalCheckout 等重複函式 ...

function renderRoleNav() {
  const nav = document.getElementById('dynamic-nav');
  // 已刪除角色專屬顏色定義
  nav.innerHTML = allCategories.map(cat => {
    const isSelected = selectedRole === cat;
    // 統一使用 CONFIG.ACTIVE_COLOR
    const activeStyle = isSelected ? `style="color:${CONFIG.ACTIVE_COLOR};"` : "";
    return `<a class="${isSelected ? 'active-role' : ''}" ${activeStyle} onclick="toggleRole('${cat}')">${cat}</a>`;
  }).join('');
}

function toggleRole(cat) { 
  selectedRole = (selectedRole === cat) ? null : cat; 
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderRoleNav(); 
  renderItems(); 
}

function renderFilters() {
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = allTypes.map(t => {
    const isActive = selectedTypes.includes(t);
    return `<label class="filter-item ${isActive ? 'active' : ''}"><input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleType('${t}')">${t}</label>`;
  }).join('');
}

function toggleType(type) {
  if (selectedTypes.includes(type)) { selectedTypes = selectedTypes.filter(t => t !== type); }
  else { selectedTypes.push(type); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderFilters(); renderItems();
}

function renderItems() {
  const container = document.getElementById('card-container');
  container.innerHTML = "";
  const isFilterMode = selectedTypes.length > 0;
  let filteredItems = isFilterMode ? allItems.filter(i => selectedTypes.includes(i.type)) : allItems;
  if (selectedRole) { filteredItems = filteredItems.filter(i => i.kind === selectedRole); }
  if (filteredItems.length === 0) {
    container.innerHTML = "<div style='padding: 40px; color: #999;'>目前還沒有這類的酷東西( ´･ᴗ･` )</div>";
    return;
  }
  if (!isFilterMode && !selectedRole) {
    allCategories.forEach(cat => {
      const catItems = filteredItems.filter(i => i.kind === cat);
      if (catItems.length === 0) return;
      const div = document.createElement('div');
      div.className = 'type-divider'; div.id = cat; div.textContent = cat;
      container.appendChild(div);
      const grid = document.createElement('div');
      grid.className = 'group-grid';
      catItems.forEach(item => grid.appendChild(createCard(item)));
      container.appendChild(grid);
    });
  } else {
    const grid = document.createElement('div');
    grid.className = 'group-grid';
    grid.style.paddingTop = "10px";
    filteredItems.forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  }
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  // 已刪除角色專屬顏色，統一使用 CONFIG.THEME_COLOR
  card.style.borderColor = CONFIG.THEME_COLOR;

  let tagText = "", tagBg = "#fab460", tagColor = "white";
  if (item.colOrder !== "") { tagText = "受注"; tagBg = "#B1DEC1"; } 
  else if (item.colStock === "" && item.colShop === "") { tagText = "點名中"; tagBg = "#D2EAF1"; tagColor = "#333"; }
  else if (item.colStock === "0" && parseFloat(item.colNonStock) > 0) { tagText = "搭機中"; tagBg = "#6C95B0"; }
  else if (item.colStock === "0" && (item.colShop === "0" || item.colShop === "")) { tagText = "需預訂"; tagBg = "#C197D2"; }
  else if (parseFloat(item.colStock) > 0 || parseFloat(item.colShop) > 0) { tagText = "現貨"; tagBg = "#FFF4BD"; tagColor = "#333"; }

  let tagHtml = (tagText === "現貨") ? `<div class="stock-tag" style="background-color:${tagBg}; color:${tagColor};">${tagText}</div>` : "";
  let addBtnHtml = `<div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')}, '${tagText}', '${tagBg}', '${tagColor}')">＋</div>`;
  
  let p = item.price === '-' ? "組合出售" : (!item.price ? "私訊花花" : (/^[0-9]+$/.test(item.price.toString().trim()) ? `$${item.price}` : item.price));
  card.innerHTML = `${tagHtml}${addBtnHtml}<img src="${item.img}"><div class="name">${formatName(item.name)}</div><div class="price">${p}</div>`;
  card.onclick = () => zoomCard(card);
  return card;
}

function formatName(n) { return n && n.length > 9 ? n.slice(0, 9) + "<br>" + n.slice(9) : n; }
function zoomCard(c) {
  const ov = document.createElement('div'); ov.className = 'card-overlay';
  const clone = c.cloneNode(true); ov.appendChild(clone);
  ov.onclick = () => ov.remove(); document.body.appendChild(ov);
}

// ... 略過 initDraggableCart ...

loadData();
</script>
</body>
