function toggleMenu(isOpen) {

function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
  fetch(url).then(r => r.text()).then(t => {
    const data = JSON.parse(t.substr(47).slice(0,-2));
    allItems = data.table.rows.map(r => {
      const getV = (idx) => (r.c[idx]?.v !== null && r.c[idx]?.v !== undefined) ? r.c[idx].v.toString().trim() : "";

function addToCart(e, item, tagText, tagBg, tagColor, pageTitle = CONFIG.SHEET_NAME) {
  e.stopPropagation();

function toggleCart(isOpen) { const panel = document.getElementById('cart-panel'); const bg = document.getElementById('cart-overlay-bg'); if(isOpen) { panel.classList.add('open'); bg.style.display = 'block'; } else { panel.classList.remove('open'); bg.style.display = 'none'; } }
function getDisplayPrice(price) { const p = (price || "").toString().trim(); if (p.indexOf('-') !== -1) return "зө„еҗҲеҮәе”®"; if (p === "") return "и©ўе•ҸиҠұиҠұ"; if (/^[0-9]+$/.test(p)) return `$${p}`; return p; }
function getLinePriceText(price) { const p = (price || "").toString().trim(); if (p.indexOf('-') !== -1) return "и©ўе•Ҹзө„еҗҲ"; if (p === "") return "и©ўе•Ҹе ұеғ№"; if (/^[0-9]+$/.test(p)) return `$${p}`; return p; }

function updateCartUI() {
  const list = document.getElementById('cart-list'), badge = document.getElementById('cart-badge'), totalEl = document.getElementById('cart-total');
  list.innerHTML = ""; let total = 0, hasInquiry = false;
  cart.forEach((item, index) => {
    const isNumeric = /^[0-9]+$/.test((item.price || "").toString().trim());
    if (isNumeric) total += parseInt(item.price); else hasInquiry = true;
    const div = document.createElement('div'); div.className = 'cart-item';
    div.innerHTML = `<img src="${item.img}"><div class="cart-item-info"><div class="cart-tag" style="background:${item.tagBg};">${item.currentStatus}</div><div style="font-weight:bold;">${item.name}</div><div style="color:#e44d26;">${getDisplayPrice(item.price)}</div></div><span style="cursor:pointer;" onclick="removeFromCart(${index})">вң•</span>`;
    list.appendChild(div);
  });
  badge.textContent = cart.length; badge.style.display = cart.length > 0 ? "flex" : "none";
  totalEl.textContent = `$${total}${hasInquiry ? " + и©ўе•Ҹе ұеғ№" : ""}`;
}

function removeFromCart(index) { cart.splice(index, 1); saveCart(); updateCartUI(); }

// дҝ®ж”№иҷ• 2пјҡиӘҝж•ҙз”ўз”ҹиЁҠжҒҜйӮҸијҜ
function generateLineMessage(lineName = "", igAccount = "") {
  let msg = "дҪ еҘҪпјҢжҲ‘жғіи©ўе•Ҹи·ҹиіјиІ·д»ҘдёӢеҜ¶еҜ¶(а§№Лҷк’івҖӢЛҷаё…)пјҡ\n\n";
  let total = 0, hasInquiry = false, lastCategory = "";
  const excludeRoles = ["з¶ңеҗҲи§’иүІ", "дёүе°Ҹйҡ»", "е…¶д»–и§’иүІ"];
  cart.forEach((item, i) => {
    if (item.category && item.category !== lastCategory) { msg += `\nгҖҗ${item.category}гҖ‘\n`; lastCategory = item.category; }
    const isNumeric = /^[0-9]+$/.test((item.price || "").toString().trim());
    if (isNumeric) total += parseInt(item.price); else hasInquiry = true;
    let displayName = item.kind && !excludeRoles.includes(item.kind) ? `${item.kind} ${item.name}` : item.name;
    msg += `${i + 1}. (${item.currentStatus}) ${displayName} ${getLinePriceText(item.price)}\n`;
  });
  msg += `\nзёҪйҮ‘йЎҚпјҡ$${total}${hasInquiry ? " + и©ўе•Ҹе ұеғ№" : ""}`;
  if (lineName || igAccount) msg += `\n\n--------------------------\nLINEпјҡ${lineName}\nIGпјҡ${igAccount}`;
  return encodeURIComponent(msg);
}

function handleCheckoutEntry() { if (cart.length === 0) return alert("иіјзү©и»ҠжҳҜз©әзҡ„е”·пјҒ"); const isMobile = /Android|iPhone/i.test(navigator.userAgent); if (isMobile) { window.location.href = CONFIG.LINE_MSG_URL + generateLineMessage(); cart = []; saveCart(); updateCartUI(); } else { openCheckoutModal(); } }

function createCard(item) {
  const card = document.createElement('div'); card.className = 'card';
  let tagText = "", tagBg = "#fab460", tagColor = "white";
  if (item.colOrder !== "") { tagText = "еҸ—жіЁ"; tagBg = "#B1DEC1"; }
  else if (item.colStock === "0" && parseFloat(item.colNonStock) > 0) { tagText = "жҗӯж©ҹдёӯ"; tagBg = "#6C95B0"; }
  else if (parseFloat(item.colStock) > 0) { tagText = "зҸҫиІЁ"; tagBg = "#FFF4BD"; tagColor = "#333"; }
  
  // гҖҗдҝ®ж”№йҮҚй»һгҖ‘пјҡи«Ӣе°ҮдёӢж–№ 'жӮЁзҡ„жЁҷйЎҢеҗҚзЁұ' дҝ®ж”№зӮәжӯӨй Ғйқўзҡ„жЁҷйЎҢ (дҫӢеҰӮ 'еҗүдјҠеҚЎе“Ү')
  let addBtnHtml = `<div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')}, '${tagText}', '${tagBg}', '${tagColor}', 'еҗүдјҠеҚЎе“Ү')">пјӢ</div>`;
  
  card.innerHTML = `${tagText ? `<div class="stock-tag" style="background:${tagBg};">${tagText}</div>` : ""}${addBtnHtml}<img src="${item.img}"><div class="name">${item.name}</div><div class="price">${getDisplayPrice(item.price)}</div>`;
  card.onclick = () => { const ov = document.createElement('div'); ov.className = 'card-overlay'; ov.innerHTML = card.outerHTML; ov.onclick = () => ov.remove(); document.body.appendChild(ov); };
  return card;
}

function renderItems() {
  const container = document.getElementById('card-container'); container.innerHTML = "";
  const filtered = selectedTypes.length > 0 ? allItems.filter(i => selectedTypes.includes(i.type)) : allItems;
  if (selectedRole) {
    const grid = document.createElement('div'); grid.className = 'group-grid';
    filtered.filter(i => i.kind === selectedRole).forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  } else {
    allCategories.forEach(cat => {
      const catItems = filtered.filter(i => i.kind === cat);
      if (catItems.length > 0) {
        const div = document.createElement('div'); div.className = 'type-divider'; div.textContent = cat; container.appendChild(div);
        const grid = document.createElement('div'); grid.className = 'group-grid';
        catItems.forEach(item => grid.appendChild(createCard(item)));
        container.appendChild(grid);
      }
    });
  }
}

loadData();
</script>
</body>
</html>
