<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="https://i.postimg.cc/VN7WjCdL/icon026.png" />
  <meta name="theme-color" content="#dac7b7" />
  
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; color: #333333; background: #fff; }
    a { text-decoration: none !important; -webkit-tap-highlight-color: transparent; }
    
    .control-btn { position: fixed; top: 20px; left: 10px; width: 45px; height: 45px; border: none; border-radius: 50%; background-color: #E7D4C0; opacity: 0.5; box-shadow: 0 0 6px rgba(0, 0, 0, 0.25); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .control-btn img { width: 65%; height: auto; object-fit: contain; }
    
    .logo-container { text-align: center; margin: 20px 0; }
    .logo-container img { width: 160px; height: auto; }
    .section-title { text-align: center; margin: 15px auto 20px auto; font-weight: bold; font-size: 1.2em; color: #5d4a3a; letter-spacing: 2px; }

    /* 輪播容器：回復原生滑動 */
    .carousel-wrapper {
      width: 100%;
      overflow-x: auto; /* 必須為 auto 手機才能滑動 */
      scroll-snap-type: x mandatory; /* 讓圖片自動對齊 */
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
    }
    .carousel-wrapper::-webkit-scrollbar { display: none; }
    .carousel-wrapper:active { cursor: grabbing; }

    .carousel {
      display: flex;
      padding: 0 10px;
      gap: 12px;
      width: max-content;
    }

    .carousel a {
      display: block;
      width: 31vw; 
      max-width: 180px; 
      flex-shrink: 0;
      scroll-snap-align: center; /* 對齊中間 */
      text-align: center;
    }

    .carousel img { width: 100%; height: auto; display: block; border-radius: 10px; pointer-events: none; margin-bottom: 8px; }
    .item-caption { font-size: 11px; color: #666; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 28px; }

    .carousel-dots { display: flex; justify-content: center; align-items: center; gap: 8px; margin: 15px 0 35px 0; }
    .dot { width: 7px; height: 7px; background-color: #eee; border-radius: 50%; cursor: pointer; transition: all 0.3s ease; }
    .dot.active { background-color: #dac7b7; transform: scale(1.3); }

    .section-divider { width: 100%; padding: 12px 0; font-weight: bold; font-size: 1.1em; text-align: center; background-color: #dac7b7; color: #ffffff; margin-bottom: 25px; }
    .social-divider { background-color: #F9F6F0; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 20px; padding: 15px 0; margin-top: 40px; }
    .social-divider a img { width: 40px; }
    
    .role-buttons { max-width: 960px; margin: 20px auto 40px auto; padding: 0 10px; }
    .role-buttons .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .role-buttons .item { width: 100px; text-align: center; }
    .role-buttons .item img { width: 100%; border-radius: 10px; transition: transform 0.2s; }
    .role-buttons .item span { display: block; font-size: 0.85em; color: #333; margin-top: 8px; font-weight: bold; }
    
    footer { text-align: center; padding: 20px 10px; font-size: 1em; color: #333333; }
  </style>
</head>
<body>

<div class="logo-container">
  <img src="https://i.postimg.cc/CLBFxHs3/logo-banner.png" alt="LOGO" />
</div>

<div class="section-title">最新開團</div>

<div class="carousel-wrapper" id="scroll-wrapper">
  <div class="carousel" id="carousel-inner"></div>
</div>

<div class="carousel-dots" id="carousel-dots"></div>

<div class="section-divider">JIWU寶寶目錄 ᯓ★ 日本IP</div>

<div class="role-buttons">
  <div class="row">
    <div class="item">
      <a href="CHWBM.html">
        <img src="https://i.postimg.cc/MHGy2vVz/12-2025xia-ri-1.png" />
        <span>吉伊卡哇</span>
      </a>
    </div>
    <div class="item">
      <a href="CParkBM.html">
        <img src="https://i.postimg.cc/50PqVSdK/ckwp-icon.png" />
        <span>吉伊卡哇樂園</span>
      </a>
    </div>
    <div class="item">
      <a href="NGNBM.html">
        <img src="https://i.postimg.cc/NMFzbfFJ/07-2025xiong-sheng-ri-6.webp" />
        <span>Nagano白熊</span>
      </a>
    </div>
  </div>
</div>

<div class="social-divider">
  <a href="https://www.instagram.com/jiwu_sales/" target="_blank"><img src="https://i.postimg.cc/Hx7srwQv/icon022.png" /></a>
  <a href="https://www.threads.com/@jiwu_sales" target="_blank"><img src="https://i.postimg.cc/brcYkZgy/icon023.png" /></a>
  <a href="https://lin.ee/X6FUFI9" target="_blank"><img src="https://i.postimg.cc/KjPGNmpn/icon024.png" /></a>
</div>

<footer>台中朋朋歡迎自取 ˖ ࣪ ★ (ง˙∇˙)ว Google有地標！</footer>

<button id="refreshBtn" class="control-btn" onclick="location.reload()" title="重新整理">
  <img src="https://i.postimg.cc/gkpnr8RJ/re.png" />
</button>

<script>
(async function() {
  const wrapper = document.getElementById('scroll-wrapper');
  const inner = document.getElementById('carousel-inner');
  const dotsContainer = document.getElementById('carousel-dots');

  const SHEET_ID = '12_TmFFXMcAAUYaUSFDTSoLIDSZ6L20XPEUIwvIIUPTM';
  const SHEET_NAME = '輪播';
  const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

  let originalCount = 0;

  async function fetchSheetData() {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/(?<=google\.visualization\.Query\.setResponse\().*(?=\);)/s)[0]);
    return json.table.rows;
  }

  function createItem(row) {
    const imgUrl = row.c[1]?.v;
    const captionText = row.c[2]?.v || ""; 
    const customLink = row.c[3]?.v || 'https://lin.ee/X6FUFI9';
    const a = document.createElement('a');
    a.href = customLink;
    a.target = '_blank';
    a.innerHTML = `<img src="${imgUrl}" /><div class="item-caption">${captionText}</div>`;
    return a;
  }

  function renderCarousel(rows) {
    inner.innerHTML = '';
    dotsContainer.innerHTML = '';
    
    const filteredRows = rows.filter(row => {
      const onShelf = row.c[0]?.v?.toString().trim();
      return onShelf?.toLowerCase() !== 'x' && row.c[1]?.v;
    });

    originalCount = filteredRows.length;
    if (originalCount === 0) return;

    // 製作三份 [1,2,3] [1,2,3] [1,2,3]
    const tripleRows = [...filteredRows, ...filteredRows, ...filteredRows];

    tripleRows.forEach((row, index) => {
      inner.appendChild(createItem(row));
      if (index >= originalCount && index < originalCount * 2) {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (index === originalCount) dot.classList.add('active');
        dot.onclick = () => {
          const item = inner.children[index];
          wrapper.scrollTo({ left: item.offsetLeft - (wrapper.offsetWidth / 2) + (item.offsetWidth / 2), behavior: 'smooth' });
        };
        dotsContainer.appendChild(dot);
      }
    });

    // 初始跳轉到中間那組
    setTimeout(() => {
      const middleItem = inner.children[originalCount];
      wrapper.scrollLeft = middleItem.offsetLeft - (wrapper.offsetWidth / 2) + (middleItem.offsetWidth / 2);
    }, 100);
  }

  // 循環監聽
  wrapper.addEventListener('scroll', () => {
    const scrollLeft = wrapper.scrollLeft;
    const singleSetWidth = inner.scrollWidth / 3;

    // 瞬間跳轉（肉眼不可見）
    if (scrollLeft <= 10) {
      wrapper.scrollLeft = singleSetWidth + 10;
    } else if (scrollLeft >= singleSetWidth * 2) {
      wrapper.scrollLeft = singleSetWidth;
    }
    updateDots();
  });

  function updateDots() {
    const dots = dotsContainer.querySelectorAll('.dot');
    if (!dots.length) return;
    const items = Array.from(inner.children);
    let activeIndex = 0;
    let minDiff = Infinity;

    items.forEach((item, i) => {
      const diff = Math.abs((item.offsetLeft + item.offsetWidth/2) - (wrapper.scrollLeft + wrapper.offsetWidth/2));
      if (diff < minDiff) { minDiff = diff; activeIndex = i; }
    });

    const dotIndex = activeIndex % originalCount;
    dots.forEach((dot, i) => dot.classList.toggle('active', i === dotIndex));
  }

  // 桌面端拖拽支援
  let isDown = false, startX, scrollLeft;
  wrapper.addEventListener('mousedown', (e) => {
    isDown = true; startX = e.pageX - wrapper.offsetLeft; scrollLeft = wrapper.scrollLeft;
    wrapper.style.scrollSnapType = 'none';
  });
  wrapper.addEventListener('mouseleave', () => { isDown = false; wrapper.style.scrollSnapType = 'x mandatory'; });
  wrapper.addEventListener('mouseup', () => { isDown = false; wrapper.style.scrollSnapType = 'x mandatory'; });
  wrapper.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - wrapper.offsetLeft;
    wrapper.scrollLeft = scrollLeft - (x - startX) * 1.5;
  });

  async function init() {
    try {
      const rows = await fetchSheetData();
      renderCarousel(rows.slice(1));
    } catch (e) { console.error('載入失敗', e); }
  }

  init();
})();
</script>
</body>
</html>
