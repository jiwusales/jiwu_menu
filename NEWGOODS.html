<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物最新開團</title>

  <meta property="og:title" content="JIWU吉物最新開團" />
  <meta property="og:description" content="官LINE請搜尋（@jiwusales）" />
  <meta property="og:image" content="https://i.postimg.cc/3R7nNT0k/icon.png" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  
  <script>
    const CONFIG = {
      THEME_COLOR: "#f2c2d5",
      ACTIVE_COLOR: "#1f6cb0",
      SHEET_ID: "1zA9Y-kgt5QPOZt_r4-H6ZTWFaLmSRjc13dcFZYEp-JY", 
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！ (৹˙꒳˙ฅ )",
      LINE_ID: "@jiwusales", 
      LINE_LINK: "https://line.me/R/ti/p/@tei8245t",
      LINE_MSG_URL: "https://line.me/R/oaMessage/@tei8245t/?",
      DEPLOY_URL: "https://script.google.com/macros/s/AKfycbzEaZqaGT4HU2sWDUIiBLQ2TljlaW4YCeupcd_yVf0AlboFATxXSKpkwUwfUWbTuovGKA/exec"
    };
  </script>

  <style>
    :root { 
      --theme-color: #f2c2d5; 
      --active-color: #1f6cb0;
      --nav-bg: #f9f9f9; 
      --text-color: #333333; 
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    
    .top-bar { background: var(--theme-color); color: #fff; padding: 10px 0; position: fixed; top: 0; left: 0; width: 100%; z-index: 999; font-size: 15px; display: flex; justify-content: center; align-items: center; }
    .top-bar .menu-btn { position: absolute; left: 15px; color: #fff; font-size: 20px; cursor: pointer; }
    .top-bar .pulse-text { display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; height: 38px; border-bottom: 1px solid #f0f0f0; }
    
    #side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: #fff; z-index: 10001; transition: 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); text-align: left; }
    #side-menu.open { left: 0; }
    .menu-header { padding: 15px; background: var(--theme-color); color: white; font-weight: bold; }
    .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; color: #555; text-decoration: none; display: block; font-size: 14px; cursor: pointer; }

    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .nav-bar { display: inline-block; padding: 8px 0; font-size: 10pt; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 0; display: inline-block; transition: 0.2s; cursor: pointer; }
    .nav-bar a.active-role { font-weight: bold; color: var(--active-color) !important; }
    .nav-bar a::after { content: "｜"; color: #aaa; margin: 0 2px; }
    .nav-bar a:last-child::after { content: ""; }

    #card-container { padding: 115px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    .banner-container { width: 100%; margin-bottom: 10px; }
    .banner-container img { width: 100%; border-radius: 8px; display: block; }
    
    .type-divider { display: flex; align-items: center; justify-content: center; margin: 15px 0 8px; font-weight: bold; scroll-margin-top: 120px; color: var(--text-color); font-size: 16px; }
    .type-divider::before, .type-divider::after { content: ""; flex: 1; border-top: 1px solid #ddd; margin: 0 10px; }
    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
    .stock-tag { position: absolute; top: 4px; left: 4px; background: #FFF4BD; color: #333; font-size: 9px; font-weight: bold; padding: 2px 4px; border-radius: 4px; z-index: 10; border: 1px solid #f2d26e; }
    .add-btn-tag { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: #ddd; color: #fff; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; }

    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto 0px; object-fit: contain; pointer-events: none; }
    .card .name { margin: 1px auto; font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; }
    .card .price { font-size: 10px; margin: 1px auto 5px; color: #666; }
    
    .card-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; justify-content: center; align-items: center; }
    .card-overlay .card { transform: scale(3.1); background: white; width: 100px; padding: 15px 0 5px; pointer-events: none; }
    
    #cart-trigger { position: fixed; top: 115px; right: 15px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; cursor: move; touch-action: none; }
    #cart-trigger img { width: 28px; height: 28px; pointer-events: none; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; font-weight: bold; }

    #cart-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
    .cart-header { padding: 12px 15px; background: #b8a597; color: white; font-weight: bold; display: flex; justify-content: space-between; }
    .cart-list { flex: 1; overflow-y: auto; padding: 10px; text-align: left; }
    .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; font-size: 12px; }
    .cart-item img { width: 45px; height: 45px; object-fit: contain; }
    .cart-footer { padding: 15px; border-top: 1px solid #eee; background: #fafafa; }
    .btn-checkout { background: #b8a597; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }

    #checkout-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: white; width: 85%; max-width: 380px; border-radius: 15px; padding: 20px; position: relative; }
    .input-box { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .summary-box { background: #f9f9f9; padding: 10px; border-radius: 5px; font-size: 12px; max-height: 250px; overflow-y: auto; text-align: left; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <span class="pulse-text" id="top-msg">載入中...</span>
  </div>

  <div id="side-menu">
    <div class="menu-header">其他團分類</div>
    <div id="side-menu-list"></div>
  </div>
  <div id="menu-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:10000" onclick="toggleMenu(false)"></div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="scroll-container"><div class="nav-bar" id="sheet-nav"></div></div>
    </div>
  </div>

  <div id="card-container"></div>

  <div id="cart-trigger">
    <img src="https://images.icon-icons.com/2098/PNG/512/shopping_cart_icon_128753.png" alt="cart">
    <div id="cart-badge">0</div>
  </div>

  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header"><span>購物車</span><span style="cursor:pointer;" onclick="toggleCart(false)">✕</span></div>
    <div class="cart-list" id="cart-list"></div>
    <div class="cart-footer">
      <span style="display:block; text-align:left; color:#aaa; font-size:12px; text-decoration:underline; cursor:pointer; margin-bottom:10px;" onclick="clearCart()">清空購物車</span>
      <div style="margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between;">
        <span>總計金額</span><span id="cart-total" style="color:#e44d26;">$0</span>
      </div>
      <button class="btn-checkout" onclick="handleCheckoutEntry()">確認結帳</button>
    </div>
  </div>

  <div id="checkout-modal">
    <div class="modal-content" id="step-1">
      <h3 style="margin-top:0;">確認訂購資料</h3>
      <div class="summary-box" id="modal-summary-list"></div>
      <p style="text-align:right; font-weight:bold;">總計：<span id="modal-total-price" style="color:#e44d26;">$0</span></p>
      <input type="text" id="user-line" class="input-box" placeholder="LINE名稱 (必填)">
      <input type="text" id="user-ig" class="input-box" placeholder="其他聯繫方式">
      <button class="btn-checkout" onclick="handleFinalCheckout()">確認訂購</button>
      <span onclick="closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; color:#ccc">✕</span>
    </div>
  </div>

<script>
let allSheets = [], currentSheet = "", sheetItems = [], cart = JSON.parse(localStorage.getItem('jiwu_cart')) || [];

function toggleMenu(o) {
  document.getElementById('side-menu').classList.toggle('open', o);
  document.getElementById('menu-overlay').style.display = o ? 'block' : 'none';
}

async function init() {
  document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;
  try {
    // 透過 gviz 取得所有分頁名稱
    const r = await fetch(`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/edit#gid=0`);
    const t = await r.text();
    const match = t.match(/bootstrapData\s*=\s*({.+?});/);
    if (match) {
      const data = JSON.parse(match[1]);
      allSheets = data.allSheets.map(s => s[1]);
      renderNav();
      if (allSheets.length > 0) switchSheet(allSheets[0]);
    }
  } catch (e) { switchSheet("各團分類"); }
  updateCartUI();
}

function renderNav() {
  const nav = document.getElementById('sheet-nav');
  const side = document.getElementById('side-menu-list');
  nav.innerHTML = allSheets.map(s => `<a class="${s===currentSheet?'active-role':''}" onclick="switchSheet('${s}')">${s}</a>`).join('');
  side.innerHTML = allSheets.map(s => `<div class="menu-item" onclick="switchSheet('${s}');toggleMenu(false)">${s}</div>`).join('');
}

async function switchSheet(name) {
  currentSheet = name;
  renderNav();
  document.getElementById('card-container').innerHTML = "讀取中...";
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r = await fetch(url);
  const t = await r.text();
  const data = JSON.parse(t.substr(47).slice(0, -2));
  const rows = data.table.rows;

  const bannerImg = rows[1]?.c[0]?.v || ""; // A2
  const themeColor = rows[1]?.c[1]?.v || CONFIG.THEME_COLOR; // B2
  document.documentElement.style.setProperty('--theme-color', themeColor);

  sheetItems = rows.slice(3).map(r => {
    const getV = (idx) => r.c[idx]?.v?.toString().trim() || "";
    return {
      role: getV(0), type: getV(1), name: getV(2), oldPrice: getV(3), 
      price: getV(4), stock: getV(5), img: getV(6) || "https://i.postimg.cc/bv5xRs04/image.png"
    };
  }).filter(i => i.name);

  renderItems(bannerImg);
}

function renderItems(banner) {
  const container = document.getElementById('card-container');
  container.innerHTML = banner ? `<div class="banner-container"><img src="${banner}"></div>` : "";
  
  const categories = [...new Set(sheetItems.map(i => i.role))];
  categories.forEach(cat => {
    const divider = document.createElement('div');
    divider.className = 'type-divider'; divider.textContent = cat;
    container.appendChild(divider);
    const grid = document.createElement('div');
    grid.className = 'group-grid';
    sheetItems.filter(i => i.role === cat).forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      const stock = parseInt(item.stock);
      const tagHtml = (!isNaN(stock) && stock > 0) ? `<div class="stock-tag">有庫存</div>` : "";
      card.innerHTML = `${tagHtml}<div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')})">＋</div><img src="${item.img}"><div class="name">${item.name}</div><div class="price">$${item.price}</div>`;
      card.onclick = () => zoomCard(card);
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

function addToCart(e, item) {
  e.stopPropagation();
  cart.push(item);
  localStorage.setItem('jiwu_cart', JSON.stringify(cart));
  updateCartUI();
}

function updateCartUI() {
  const list = document.getElementById('cart-list');
  const badge = document.getElementById('cart-badge');
  const totalEl = document.getElementById('cart-total');
  list.innerHTML = ""; let total = 0;
  cart.forEach((item, idx) => {
    total += parseInt(item.price) || 0;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<img src="${item.img}"><div style="flex:1"><b>${item.name}</b><br><span style="color:#e44d26">$${item.price}</span></div><span onclick="removeFromCart(${idx})" style="cursor:pointer;color:#ccc">✕</span>`;
    list.appendChild(div);
  });
  badge.textContent = cart.length;
  badge.style.display = cart.length > 0 ? 'flex' : 'none';
  totalEl.textContent = `$${total}`;
}

function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('jiwu_cart', JSON.stringify(cart)); updateCartUI(); }
function clearCart() { cart = []; localStorage.setItem('jiwu_cart', JSON.stringify(cart)); updateCartUI(); }
function toggleCart(o) { document.getElementById('cart-panel').classList.toggle('open', o); document.getElementById('cart-overlay-bg').style.display = o?'block':'none'; }
function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }
function handleCheckoutEntry() { 
  if(cart.length===0) return;
  document.getElementById('checkout-modal').style.display = 'flex';
  const summary = document.getElementById('modal-summary-list');
  summary.innerHTML = cart.map(i => `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${i.name}</span><span>$${i.price}</span></div>`).join('');
  document.getElementById('modal-total-price').textContent = document.getElementById('cart-total').textContent;
}

function handleFinalCheckout() {
  const line = document.getElementById('user-line').value;
  if(!line) return alert("請輸入LINE名稱");
  const msg = encodeURIComponent(`我想購買：\n${cart.map(i=>i.name).join('\n')}\n總金額：${document.getElementById('modal-total-price').textContent}\nLINE：${line}`);
  window.location.href = CONFIG.LINE_MSG_URL + msg;
}

function zoomCard(c) {
  const ov = document.createElement('div'); ov.className = 'card-overlay';
  const clone = c.cloneNode(true); ov.appendChild(clone);
  ov.onclick = () => ov.remove(); document.body.appendChild(ov);
}

// 購物車拖曳功能
(function dragCart(){
  const el = document.getElementById('cart-trigger');
  let isDragging = false, startX, startY, initX, initY;
  const start = (e) => {
    isDragging = false;
    const c = e.type === 'touchstart' ? e.touches[0] : e;
    startX = c.clientX; startY = c.clientY;
    const r = el.getBoundingClientRect(); initX = r.left; initY = r.top;
    document.addEventListener('mousemove', move); document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('mouseup', end); document.addEventListener('touchend', end);
  };
  const move = (e) => {
    const c = e.type === 'touchmove' ? e.touches[0] : e;
    const dx = c.clientX - startX, dy = c.clientY - startY;
    if(Math.abs(dx)>5 || Math.abs(dy)>5){
      isDragging = true; el.style.left = (initX+dx)+'px'; el.style.top = (initY+dy)+'px';
    }
  };
  const end = () => {
    document.removeEventListener('mousemove', move); document.removeEventListener('touchmove', move);
    if(!isDragging) toggleCart(true);
  };
  el.addEventListener('mousedown', start); el.addEventListener('touchstart', start);
})();

init();
</script>
</body>
</html>
