<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物最新開團</title>

  <meta property="og:title" content="JIWU吉物最新開團" />
  <meta property="og:description" content="官LINE請搜尋（@jiwusales）" />
  <meta property="og:image" content="https://i.postimg.cc/3R7nNT0k/icon.png" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  
  <script>
    const CONFIG = {
      THEME_COLOR: "#f2c2d5",
      ACTIVE_COLOR: "#1f6cb0",
      SHEET_ID: "1zA9Y-kgt5QPOZt_r4-H6ZTWFaLmSRjc13dcFZYEp-JY", 
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！ (৹˙꒳˙ฅ )",
      FAVICON: "https://i.postimg.cc/3R7nNT0k/icon.png",
      LINE_ID: "@jiwusales", 
      LINE_LINK: "https://line.me/R/ti/p/@tei8245t",
      LINE_MSG_URL: "https://line.me/R/oaMessage/@tei8245t/?",
      DEPLOY_URL: "" // 您的 GAS 部署網址
    };

    // 取得網址參數中的分頁名稱，若無則預設為第一頁（後續由程式自動偵測）
    let urlParams = new URLSearchParams(window.location.search);
    let currentSheetName = urlParams.get('sheet');
  </script>

  <style>
    :root { 
      --theme-color: #f2c2d5; 
      --active-color: #1f6cb0;
      --nav-bg: #f9f9f9; 
      --text-color: #333333; 
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    
    .top-bar { 
      background: var(--theme-color); 
      color: #fff; 
      padding: 10px 0; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      z-index: 999; 
      font-size: 15px; 
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .top-bar .menu-btn { 
      position: absolute; 
      left: 15px; 
      color: #fff; 
      font-size: 20px; 
      cursor: pointer; 
    }
    .top-bar .pulse-text { display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 38px; }
    
    #side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: #fff; z-index: 10001; transition: 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); text-align: left; }
    #side-menu.open { left: 0; }
    
    .menu-header { padding: 15px; background: var(--theme-color); color: white; font-weight: bold; display: flex; align-items: center; }
    .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; color: #555; text-decoration: none; display: block; font-size: 14px; }
    .menu-item:active { background: #f9f9f9; }
    .menu-item.active { color: var(--active-color); font-weight: bold; background: #f0f8ff; }
    #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000; display: none; }

    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .nav-bar { display: inline-block; padding: 8px 0; font-size: 10pt; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 0; display: inline-block; transition: 0.2s; cursor: pointer; }
    .nav-bar a.active-role { font-weight: bold; color: var(--active-color) !important; }
    .nav-bar a::after { content: "｜"; color: #aaa; margin: 0 2px; font-weight: normal; }
    .nav-bar a:last-child::after { content: ""; }

    .nav-arrow { width: 24px; font-size: 16px; cursor: pointer; flex-shrink: 0; user-select: none; color: #bbb; display: flex; justify-content: center; align-items: center; }

    #card-container { padding: 90px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    .type-divider { display: flex; align-items: center; justify-content: center; margin: 15px 0 8px; font-weight: bold; scroll-margin-top: 100px; color: var(--text-color); font-size: 16px; }
    .type-divider::before, .type-divider::after { content: ""; flex: 1; border-top: 1px solid #ddd; margin: 0 10px; }
    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); justify-content: start; gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2.5px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
    .stock-tag { position: absolute; top: 4px; left: 4px; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; min-width: 35px;}
    .add-btn-tag { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: #ddd; color: #fff; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; cursor: pointer; pointer-events: auto; }

    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto 0px; object-fit: contain; pointer-events: none; }
    .card .name { margin: 1px auto; font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; }
    .card .price { font-size: 10px; margin: 1px auto 5px; color: #666; }
    
    .card-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .card-overlay .card { transform: scale(3.1); background: white; width: 100px; padding: 15px 0 5px; pointer-events: none; border-width: 1px; }
    
    #cart-trigger { position: fixed; top: 90px; right: 15px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; opacity: 0.8; cursor: pointer; }
    #cart-trigger img { width: 28px; height: 28px; pointer-events: none; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; font-weight: bold; }

    #cart-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }

    .cart-header { padding: 12px 15px; background: #b8a597; color: white; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    .cart-list { flex: 1; overflow-y: auto; padding: 10px; text-align: left; }
    .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; font-size: 12px; }
    .cart-item img { width: 45px; height: 45px; object-fit: contain; }
    .cart-item-info { flex: 1; }

    .cart-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; color: white; margin-bottom: 3px; font-weight: bold; }
    .cart-footer { padding: 15px 15px 25px; border-top: 1px solid #eee; background: #fafafa; }
    .text-clear { display: block; text-align: left; color: #aaa; font-size: 13px; text-decoration: underline; cursor: pointer; margin-bottom: 12px; }
    .btn-checkout { background: #b8a597; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }

    #checkout-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: white; width: 85%; max-width: 380px; border-radius: 15px; padding: 20px; position: relative; }
    .input-box { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .summary-box { background: #f9f9f9; padding: 10px; border-radius: 5px; font-size: 12px; max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 10px; border: 1px solid #eee; }
  </style>
</head>
<body>
 <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <span class="pulse-text" id="top-msg">載入中...</span>
  </div>

  <!-- 左側伸縮選單 -->
  <div id="menu-overlay" onclick="toggleMenu(false)"></div>
  <div id="side-menu">
    <div class="menu-header">JIWU 吉物其他團</div>
    <div id="sheet-list"></div>
  </div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="role-scroll"><div class="nav-bar" id="dynamic-nav"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(150,0)">❯</div>
    </div>
  </div>

  <div id="card-container"></div>

  <div id="cart-trigger" onclick="toggleCart(true)">
    <img src="https://images.icon-icons.com/2098/PNG/512/shopping_cart_icon_128753.png" alt="cart">
    <div id="cart-badge">0</div>
  </div>

  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header">
      <span>購物車</span>
      <span style="cursor:pointer;" onclick="toggleCart(false)">✕</span>
    </div>
    <div class="cart-list" id="cart-list"></div>
    <div class="cart-footer">
      <span class="text-clear" onclick="clearCart()">清空購物車</span>
      <div style="margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between;">
        <span>總計金額</span>
        <span id="cart-total" style="color: #e44d26;">$0</span>
      </div>
      <button class="btn-checkout" onclick="handleCheckoutEntry()">確認結帳</button>
    </div>
  </div>

  <div id="checkout-modal">
    <div class="modal-content" id="step-1">
      <h3 style="margin-top:0;">確認訂購資料</h3>
      <div class="summary-box" id="modal-summary-list"></div>
      <input type="text" id="user-line" class="input-box" placeholder="LINE名稱 (必填)">
      <input type="text" id="user-ig" class="input-box" placeholder="其他聯繫方式">
      <button class="btn-checkout" onclick="handleFinalCheckout()">確認訂購</button>
      <span onclick="closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; color:#ccc">✕</span>
    </div>
  </div>

<script>
document.documentElement.style.setProperty('--theme-color', CONFIG.THEME_COLOR);
document.documentElement.style.setProperty('--active-color', CONFIG.ACTIVE_COLOR);
document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;

let allItems = [], allCategories = [], selectedRole = null, cart = JSON.parse(localStorage.getItem('jiwu_cart')) || [];

function toggleMenu(open) {
  document.getElementById('side-menu').classList.toggle('open', open);
  document.getElementById('menu-overlay').style.display = open ? 'block' : 'none';
}

async function loadData() {
  // 1. 自動偵測分頁名稱
  const metaUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/edit#gid=0`;
  // 透過 GAS 或簡單的 fetch 獲取分頁有難度時，我們用 Google Visualization API 嘗試抓取
  // 這裡使用一個技巧：如果沒有指定 sheetName，就預設用導覽列顯示切換
  
  const sheetListUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json`;
  
  fetch(sheetListUrl).then(r => r.text()).then(t => {
    const data = JSON.parse(t.substr(47).slice(0,-2));
    // 雖然無法直接拿分頁清單，但可以從 URLParams 控制。
    // 如果您需要「自動偵測目前分頁」，建議在此手動輸入您目前有的分頁名稱陣列，或者維持由 URL 進入。
    // 這裡我們暫定由抓取的內容來決定。
  });

  // 改用當前分頁或預設
  if(!currentSheetName) currentSheetName = "Sheet1"; // 預設

  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(currentSheetName)}`;
  
  try {
    const r = await fetch(url);
    const t = await r.text();
    const data = JSON.parse(t.substr(47).slice(0,-2));
    
    allItems = data.table.rows.map(r => {
      const getV = (idx) => {
        const val = r.c[idx]?.v;
        return (val !== null && val !== undefined) ? val.toString().trim() : "";
      };
      // 欄位：0首圖、1色系、2角色、3種類、4名稱、5原價、6售價、7庫存、8圖片、9商品網址、10備註
      return {
        mainPic: getV(0),
        themeColor: getV(1) || CONFIG.THEME_COLOR,
        kind: getV(2) || "其他",
        type: getV(3),
        name: getV(4),
        price: getV(6),
        stock: parseInt(getV(7)) || 0,
        img: getV(8) || getV(0) || "https://i.postimg.cc/bv5xRs04/image.png"
      };
    }).filter(i => i.name !== "");

    allCategories = [...new Set(allItems.map(i => i.kind))];
    renderRoleNav();
    renderItems();
    updateCartUI();
    renderSheetList(); // 渲染側邊欄
  } catch (e) { 
    document.getElementById('card-container').innerHTML = "載入中或分頁名稱不正確，請確認試算表名稱。"; 
  }
}

function renderSheetList() {
    // 這裡建議手動更新您的分頁名稱清單，因為 Google API 限制無法直接抓取分頁清單
    const sheets = ["分頁1", "分頁2"]; // 請在此填入您的分頁名稱
    const list = document.getElementById('sheet-list');
    list.innerHTML = sheets.map(s => `<a href="?sheet=${encodeURIComponent(s)}" class="menu-item ${currentSheetName===s?'active':''}">${s}</a>`).join('');
}

function renderRoleNav() {
  const nav = document.getElementById('dynamic-nav');
  nav.innerHTML = allCategories.map(cat => `<a class="${selectedRole === cat ? 'active-role' : ''}" onclick="toggleRole('${cat}')">${cat}</a>`).join('');
}

function toggleRole(cat) {
  selectedRole = (selectedRole === cat) ? null : cat;
  renderRoleNav(); renderItems();
}

function renderItems() {
  const container = document.getElementById('card-container');
  container.innerHTML = "";
  let filtered = selectedRole ? allItems.filter(i => i.kind === selectedRole) : allItems;

  if (!selectedRole) {
    allCategories.forEach(cat => {
      const catItems = filtered.filter(i => i.kind === cat);
      if (catItems.length === 0) return;
      const div = document.createElement('div');
      div.className = 'type-divider'; div.id = cat; div.textContent = cat;
      container.appendChild(div);
      const grid = document.createElement('div');
      grid.className = 'group-grid';
      catItems.forEach(item => grid.appendChild(createCard(item)));
      container.appendChild(grid);
    });
  } else {
    const grid = document.createElement('div');
    grid.className = 'group-grid';
    filtered.forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  }
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.borderColor = item.themeColor;

  let tagText = "需預訂", tagBg = "#C197D2", tagColor = "white";
  if (item.stock > 0) { 
    tagText = "有庫存"; tagBg = "#FFF4BD"; tagColor = "#333"; 
  }

  let tagHtml = `<div class="stock-tag" style="background-color:${tagBg}; color:${tagColor};">${tagText}</div>`;
  let addBtnHtml = `<div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')}, '${tagText}', '${tagBg}', '${tagColor}')">＋</div>`;
  
  card.innerHTML = `${tagHtml}${addBtnHtml}<img src="${item.img}"><div class="name">${item.name}</div><div class="price">$${item.price}</div>`;
  card.onclick = () => zoomCard(card);
  return card;
}

function zoomCard(c) {
  const ov = document.createElement('div'); ov.className = 'card-overlay';
  const clone = c.cloneNode(true); ov.appendChild(clone);
  ov.onclick = () => ov.remove(); document.body.appendChild(ov);
}

function addToCart(e, item, tagText, tagBg, tagColor) {
  e.stopPropagation();
  cart.push({ ...item, currentStatus: tagText, tagBg, tagColor });
  saveCart(); updateCartUI();
}

function saveCart() { localStorage.setItem('jiwu_cart', JSON.stringify(cart)); }

function updateCartUI() {
  const list = document.getElementById('cart-list');
  const badge = document.getElementById('cart-badge');
  const totalEl = document.getElementById('cart-total');
  list.innerHTML = "";
  let total = 0;
  cart.forEach((item, index) => {
    total += parseInt(item.price) || 0;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<img src="${item.img}"><div class="cart-item-info"><div class="cart-tag" style="background-color:${item.tagBg}; color:${item.tagColor}">${item.currentStatus}</div><div style="font-weight:bold;">${item.name}</div><div style="color:#e44d26;">$${item.price}</div></div><span onclick="removeFromCart(${index})" style="cursor:pointer; color:#ccc;">✕</span>`;
    list.appendChild(div);
  });
  badge.textContent = cart.length;
  badge.style.display = cart.length > 0 ? "flex" : "none";
  totalEl.textContent = `$${total}`;
}

function removeFromCart(index) { cart.splice(index, 1); saveCart(); updateCartUI(); }
function clearCart() { if(confirm("清空？")) { cart = []; saveCart(); updateCartUI(); } }
function toggleCart(open) { 
    document.getElementById('cart-panel').classList.toggle('open', open); 
    document.getElementById('cart-overlay-bg').style.display = open ? 'block' : 'none';
}

function handleCheckoutEntry() {
    const msg = encodeURIComponent("你好，我想購買：\n" + cart.map(i => `- ${i.name} ($${i.price})`).join("\n"));
    window.location.href = CONFIG.LINE_MSG_URL + msg;
}

loadData();
</script>
</body>
</html>
