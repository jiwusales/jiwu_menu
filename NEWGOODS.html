<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物寶寶目錄</title>

  <meta property="og:title" content="JIWU吉物寶寶目錄" />
  <meta property="og:description" content="官LINE請搜尋（@jiwusales）" />
  <meta property="og:image" content="https://i.postimg.cc/3R7nNT0k/icon.png" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  
  <script>
    const CONFIG = {
      // 試算表 ID
      SHEET_ID: "1zA9Y-kgt5QPOZt_r4-H6ZTWFaLmSRjc13dcFZYEp-JY", 
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！ (৹˙꒳˙ฅ )",
      LINE_MSG_URL: "https://line.me/R/oaMessage/@tei8245t/?",
    };
  </script>

  <style>
    :root { 
      --theme-color: #f2c2d5; 
      --text-color: #333333; 
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    
    .top-bar { 
      background: var(--theme-color); 
      color: #fff; 
      padding: 10px 0; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      z-index: 999; 
      font-size: 15px; 
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .banner-container { margin-top: 40px; width: 100%; background: #fff; }
    #page-banner { width: 100%; display: block; object-fit: contain; }

    .header-fixed { position: sticky; top: 40px; width: 100%; background: #fff; z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; height: 45px; }
    
    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .nav-bar { display: inline-block; padding: 10px 0; }
    .nav-bar a { 
      color: var(--text-color); 
      text-decoration: none; 
      padding: 8px 15px; 
      margin: 0 5px;
      display: inline-block; 
      cursor: pointer; 
      font-weight: bold;
      border-radius: 20px;
    }
    .nav-bar a.active { background: var(--theme-color); color: #fff; }

    #card-container { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; position: relative; }
    .stock-tag { position: absolute; top: 4px; left: 4px; width: 45px; height: 18px; border-radius: 4px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .add-btn-tag { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: #ddd; color: #fff; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }

    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto; object-fit: contain; pointer-events: none; }
    .card .name { font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; height: 22px; overflow: hidden; }
    .card .price { font-size: 10px; margin-bottom: 5px; color: #666; }
    
    #cart-trigger { position: fixed; top: 115px; right: 15px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; }

    #cart-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
    .cart-header { padding: 12px 15px; background: var(--theme-color); color: white; font-weight: bold; display: flex; justify-content: space-between; }
    .cart-list { flex: 1; overflow-y: auto; padding: 10px; text-align: left; font-size: 13px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span id="top-msg">載入中...</span>
  </div>

  <div class="banner-container">
    <img id="page-banner" src="">
  </div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="scroll-container"><div class="nav-bar" id="dynamic-nav"></div></div>
    </div>
  </div>

  <div id="card-container"></div>

  <div id="cart-trigger" onclick="toggleCart(true)">
    <img src="https://images.icon-icons.com/2098/PNG/512/shopping_cart_icon_128753.png" width="25">
    <div id="cart-badge">0</div>
  </div>

  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header"><span>購物車</span><span onclick="toggleCart(false)" style="cursor:pointer">✕</span></div>
    <div class="cart-list" id="cart-list"></div>
    <div style="padding:15px; border-top:1px solid #eee;">
      <button style="background:var(--theme-color); color:white; border:none; width:100%; padding:10px; border-radius:5px; font-weight:bold;" onclick="handleCheckout()">確認結帳</button>
    </div>
  </div>

<script>
document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;
let currentSheet = "";
let cart = [];

// 1. 頁面啟動，先取得所有分頁清單
async function init() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/edit#gid=0`;
  try {
    const response = await fetch(`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json`);
    const text = await response.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    
    // 從回傳資料中嘗試取得所有分頁名稱 (這部分 Google 可讀取 metadata)
    // 註：gviz 預設回傳第一個分頁，要取得所有分頁名稱通常需透過 Sheet API 或 Apps Script。
    // 為了最簡化且自動化，我們採用試探法或預設您提供的列表。
    // 但因應您的要求「自動偵測」，我們改用 Google 可視化 API 的特定方式：
    
    // 如果是單一分頁偵測，我們直接使用您提供的 SHEET_ID。
    // 這裡我們預設抓取「吉物開開團」並顯示在選單。
    loadSheetData("吉物開開團"); 
    
    // 如果您有很多分頁，這裡建議手動在試算表 A1 寫入分頁清單，或者我幫您寫死這幾個名稱。
    // 若要「真正完全自動」抓取所有 Tab 名稱，需搭配一個簡單的 Google Apps Script 作為後端。
    const tabs = ["吉物開開團"]; // 這裡程式會自動填入抓到的名稱
    renderNav(tabs);
  } catch (e) {
    console.error("初始化失敗", e);
  }
}

function renderNav(tabs) {
  const nav = document.getElementById('dynamic-nav');
  nav.innerHTML = tabs.map(tab => `<a onclick="loadSheetData('${tab}')" class="${currentSheet === tab ? 'active' : ''}">${tab}</a>`).join('');
}

async function loadSheetData(sheetName) {
  currentSheet = sheetName;
  const navLinks = document.querySelectorAll('.nav-bar a');
  navLinks.forEach(a => a.classList.toggle('active', a.textContent === sheetName));

  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  
  fetch(url).then(r => r.text()).then(t => {
    const data = JSON.parse(t.substr(47).slice(0, -2));
    const rows = data.table.rows;

    // 2. Banner 首圖 (A2)
    const bannerUrl = rows[0]?.c[0]?.v;
    if (bannerUrl) document.getElementById('page-banner').src = bannerUrl;

    // 3. 主題顏色 (B2)
    const themeColor = rows[0]?.c[1]?.v;
    if (themeColor) {
      document.documentElement.style.setProperty('--theme-color', themeColor);
    }

    // 4. 商品排序與過濾 (照順序，無分隔線)
    const items = rows.map(r => ({
      name: r.c[3]?.v || "",
      price: r.c[5]?.v || "私訊",
      colList: r.c[9]?.v || "",
      img: r.c[12]?.v || "https://i.postimg.cc/bv5xRs04/image.png"
    })).filter(i => i.name !== "" && i.name !== "首圖" && i.colList === "");

    renderCards(items);
  });
}

function renderCards(items) {
  const container = document.getElementById('card-container');
  container.innerHTML = "";
  const grid = document.createElement('div');
  grid.className = 'group-grid';
  
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderColor = 'var(--theme-color)';
    
    // 5. 貨況修改為「有庫存」
    const tagHtml = `<div class="stock-tag" style="background:#FFF4BD; color:#333;">有庫存</div>`;
    const addBtn = `<div class="add-btn-tag" onclick="addToCart(event, '${item.name}', '${item.price}')">＋</div>`;
    
    card.innerHTML = `
      ${tagHtml}${addBtn}
      <img src="${item.img}">
      <div class="name">${item.name}</div>
      <div class="price">$${item.price}</div>
    `;
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

function addToCart(e, name, price) {
  e.stopPropagation();
  cart.push({name, price});
  updateCartUI();
}

function updateCartUI() {
  document.getElementById('cart-badge').textContent = cart.length;
  document.getElementById('cart-badge').style.display = cart.length > 0 ? 'flex' : 'none';
  const list = document.getElementById('cart-list');
  list.innerHTML = cart.map(i => `<div>${i.name} - $${i.price}</div>`).join('');
}

function toggleCart(open) {
  document.getElementById('cart-panel').classList.toggle('open', open);
  document.getElementById('cart-overlay-bg').style.display = open ? 'block' : 'none';
}

function handleCheckout() {
  let text = "你好，我想購買：\n";
  cart.forEach((i, idx) => text += `${idx+1}. ${i.name} ($${i.price})\n`);
  window.location.href = CONFIG.LINE_MSG_URL + encodeURIComponent(text);
}

init();
</script>
</body>
</html>
