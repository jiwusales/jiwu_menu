<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物最新開團</title>

  <script>
    const CONFIG = {
      DEFAULT_COLOR: "#f2c2d5",
      ACTIVE_COLOR: "#1f6cb0",
      SHEET_ID: "1zA9Y-kgt5QPOZt_r4-H6ZTWFaLmSRjc13dcFZYEp-JY",
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！ (৹˙꒳˙ฅ )",
      LINE_LINK: "https://line.me/R/ti/p/@tei8245t",
      LINE_MSG_URL: "https://line.me/R/oaMessage/@tei8245t/?"
    };
  </script>

  <style>
    :root { --theme-color: #f2c2d5; --active-color: #1f6cb0; --nav-bg: #f9f9f9; --text-color: #333333; }
    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    
    /* 頂部導航 */
    .top-bar { background: var(--theme-color); color: #fff; padding: 10px 0; position: fixed; top: 0; left: 0; width: 100%; z-index: 999; font-size: 15px; display: flex; justify-content: center; align-items: center; transition: background 0.4s; }
    .top-bar .menu-btn { position: absolute; left: 15px; color: #fff; font-size: 20px; cursor: pointer; }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 45px; }
    
    /* 側邊選單 */
    #side-menu { position: fixed; top: 0; left: -250px; width: 220px; height: 100%; background: #fff; z-index: 10001; transition: 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); text-align: left; }
    #side-menu.open { left: 0; }
    .menu-header { padding: 15px; background: var(--theme-color); color: white; font-weight: bold; transition: background 0.4s; }
    .menu-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; color: #555; text-decoration: none; display: block; font-size: 14px; cursor: pointer; }
    #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000; display: none; }

    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .nav-bar { display: inline-block; padding: 0 10px; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 15px; display: inline-block; cursor: pointer; border-radius: 20px; margin: 0 4px; font-size: 14px; transition: 0.3s; }
    .nav-bar a.active-role { font-weight: bold; color: #fff !important; background-color: var(--active-color); }

    #banner-area { width: 100%; max-width: 600px; margin: 0 auto; padding: 5px; }
    #banner-area img { width: 100%; border-radius: 8px; display: block; }
    
    #card-container { padding: 95px 10px 10px; }
    .group-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-top: 10px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 130px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; position: relative; transition: border-color 0.4s; }
    .stock-tag { position: absolute; top: 4px; left: 4px; padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #FFF4BD; color: #333; z-index: 5; }
    .add-btn-tag { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: #eee; color: #555; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 6; }
    .card img { height: 100px; width: auto; max-width: 90%; display: block; margin: 8px auto 5px; object-fit: contain; }
    .card .name { font-size: 10px; font-weight: bold; padding: 0 4px; height: 2.4em; overflow: hidden; line-height: 1.2; }
    .card .price { font-size: 11px; margin: 4px 0 10px; color: var(--theme-color); font-weight: bold; }

    /* 購物車拖拽按鈕 */
    #cart-trigger { 
      position: fixed; top: 120px; right: 15px; width: 55px; height: 55px; 
      background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
      box-shadow: 0 3px 12px rgba(0,0,0,0.15); z-index: 999; cursor: move; touch-action: none; 
    }
    #cart-trigger img { width: 30px; pointer-events: none; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 11px; border-radius: 50%; width: 20px; height: 20px; display: none; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; }

    /* 購物車面板 */
    #cart-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: white; z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
    .cart-header { padding: 15px; background: var(--theme-color); color: white; font-weight: bold; display: flex; justify-content: space-between; transition: background 0.4s; }
    
    .btn-checkout { background: var(--theme-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.4s; }

    /* 彈出視窗 */
    .card-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; justify-content: center; align-items: center; }
    .zoomed-content { background: white; width: 85%; max-width: 350px; border-radius: 15px; padding: 20px; position: relative; text-align: center; }
    .zoomed-content img { width: 100%; max-height: 50vh; object-fit: contain; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="menu-btn" onclick="toggleMenu(true)">☰</div>
    <span id="top-msg">載入中...</span>
  </div>

  <div id="side-menu">
    <div class="menu-header">分類導覽</div>
    <div id="side-menu-list"></div>
    <a class="menu-item" href="https://line.me/R/ti/p/@tei8245t" target="_blank" style="background: #f9f9f9; font-weight: bold;">聯繫官LINE</a>
  </div>
  <div id="menu-overlay" onclick="toggleMenu(false)"></div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="scroll-container"><div class="nav-bar" id="dynamic-nav"></div></div>
    </div>
  </div>

  <div id="card-container">
    <div id="banner-area"></div>
    <div id="items-grid" class="group-grid"></div>
  </div>

  <!-- 購物車球 -->
  <div id="cart-trigger">
    <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="cart">
    <div id="cart-badge">0</div>
  </div>

  <!-- 購物車面板 -->
  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header"><span>購物車</span><span style="cursor:pointer" onclick="toggleCart(false)">✕</span></div>
    <div id="cart-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
    <div style="padding:15px; border-top:1px solid #eee; background:#fafafa;">
      <div style="margin-bottom:12px; display:flex; justify-content:space-between; font-weight:bold;"><span>總計金額</span><span id="cart-total">$0</span></div>
      <button class="btn-checkout" onclick="handleCheckout()">確認結帳傳送 LINE</button>
    </div>
  </div>

<script>
  let cart = JSON.parse(localStorage.getItem('jiwu_cart_v2')) || [];
  let allSheetNames = [];

  // 【核心更新】真正自動偵測所有分頁名稱
  async function fetchSheetNames() {
    // 必須使用 pubhtml 路徑才能抓到分頁選單
    const listUrl = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/pubhtml?gid=0`;
    try {
      const hResp = await fetch(listUrl);
      const hText = await hResp.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(hText, 'text/html');
      
      // 抓取 Google 試算表底部的分頁頁籤
      const tabs = doc.querySelectorAll('#sheet-menu li a');
      if (tabs.length > 0) {
        return Array.from(tabs).map(t => t.textContent.trim());
      }
      
      // 備案：如果只有單一分頁且沒顯示選單，嘗試抓取標題
      const title = doc.querySelector('.sheet-name');
      if (title) return [title.textContent.trim()];

      return null;
    } catch(e) { 
      console.warn("自動偵測失敗:", e);
      return null; 
    }
  }

  async function init() {
    document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;
    
    // 1. 自動偵測分頁
    const detectedNames = await fetchSheetNames();
    
    // 2. 如果偵測成功就使用，失敗才用備案
    allSheetNames = detectedNames || ["0524收單⛔️呪術廻戦 × nhutoons"]; 
    
    renderNavs(allSheetNames);
    loadSheet(allSheetNames[0]); // 自動載入第一個分頁
    updateCartUI();
    initDrag(); 
  }

  function renderNavs(names) {
    const nav = document.getElementById('dynamic-nav');
    const side = document.getElementById('side-menu-list');
    nav.innerHTML = names.map(name => `<a id="nav-${name}" onclick="loadSheet('${name}')">${name}</a>`).join('');
    side.innerHTML = names.map(name => `<div class="menu-item" onclick="loadSheet('${name}'); toggleMenu(false);">${name}</div>`).join('');
  }

  async function loadSheet(name) {
    // 更新 UI 狀態
    document.querySelectorAll('.nav-bar a').forEach(a => a.classList.remove('active-role'));
    const activeNav = document.getElementById(`nav-${name}`);
    if(activeNav) activeNav.classList.add('active-role');

    // 抓取該分頁資料
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
    try {
      const resp = await fetch(url);
      const text = await resp.text();
      const data = JSON.parse(text.substr(47).slice(0, -2));
      const rows = data.table.rows;

      const bannerImg = rows[0]?.c[1]?.v || ""; 
      const themeColor = rows[1]?.c[1]?.v || CONFIG.DEFAULT_COLOR; 
      
      document.documentElement.style.setProperty('--theme-color', themeColor);
      document.getElementById('banner-area').innerHTML = bannerImg ? `<img src="${bannerImg}">` : "";

      const items = rows.slice(2).map(r => {
        const getV = (i) => r.c[i]?.v?.toString() || "";
        return { 
          role: getV(0), type: getV(1), name: getV(2), 
          oldPrice: getV(3), price: getV(4), stock: getV(5), 
          img: getV(6) || "https://i.postimg.cc/bv5xRs04/image.png", 
          url: getV(7), note: getV(8), sheet: name 
        };
      }).filter(i => i.name);

      renderItems(items);
    } catch (e) {
      console.error("載入分頁失敗:", e);
    }
  }

  function renderItems(items) {
    document.getElementById('items-grid').innerHTML = items.map(item => `
      <div class="card" onclick="zoomCard(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        ${(item.stock > 0) ? '<div class="stock-tag">有庫存</div>' : ''}
        <div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')})">＋</div>
        <img src="${item.img}">
        <div class="name">${item.name}</div>
        <div class="price">$${item.price}</div>
      </div>`).join('');
  }

  function addToCart(e, item) {
    e.stopPropagation();
    cart.push(item);
    localStorage.setItem('jiwu_cart_v2', JSON.stringify(cart));
    updateCartUI();
  }

  function updateCartUI() {
    let total = 0;
    document.getElementById('cart-list').innerHTML = cart.map((item, idx) => {
      total += parseInt(item.price) || 0;
      return `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px;">
        <img src="${item.img}" style="width:45px; height:45px; object-fit:contain;">
        <div style="flex:1; text-align:left; font-size:12px;"><div style="font-weight:bold;">${item.name}</div><div style="color:var(--theme-color); font-weight:bold;">$${item.price}</div></div>
        <span onclick="removeItem(${idx})" style="cursor:pointer; color:#ccc; font-size:18px;">✕</span>
      </div>`;
    }).join('');
    document.getElementById('cart-total').textContent = `$${total}`;
    const badge = document.getElementById('cart-badge');
    badge.textContent = cart.length;
    badge.style.display = cart.length > 0 ? "flex" : "none";
  }

  function removeItem(idx) { cart.splice(idx, 1); updateCartUI(); localStorage.setItem('jiwu_cart_v2', JSON.stringify(cart)); }
  function toggleMenu(o) { document.getElementById('side-menu').classList.toggle('open', o); document.getElementById('menu-overlay').style.display = o ? 'block' : 'none'; }
  function toggleCart(o) { document.getElementById('cart-panel').classList.toggle('open', o); document.getElementById('cart-overlay-bg').style.display = o ? 'block' : 'none'; }

  function zoomCard(item) {
    const ov = document.createElement('div');
    ov.className = 'card-overlay';
    ov.innerHTML = `<div class="zoomed-content">
      <span style="position:absolute; top:10px; right:15px; font-size:20px; cursor:pointer; color:#ccc;" onclick="this.parentElement.parentElement.remove()">✕</span>
      <img src="${item.img}"><h3>${item.name}</h3><p style="color:var(--theme-color); font-weight:bold; font-size:20px;">$${item.price}</p>
      <div style="text-align:left; font-size:13px; color:#666;">
        <div>分類：${item.sheet} / ${item.type}</div>
        ${item.note ? '<div style="margin-top:5px; padding:8px; background:#f5f5f5;">備註：'+item.note+'</div>' : ''}
      </div>
      <button class="btn-checkout" style="margin-top:15px;" onclick="window.open('${item.url || CONFIG.LINE_LINK}')">查看商品網址</button>
    </div>`;
    ov.onclick = e => { if(e.target === ov) ov.remove(); };
    document.body.appendChild(ov);
  }

  function handleCheckout() {
    if (cart.length === 0) return alert("購物車是空的唷！");
    let msg = "你好，我想訂購以下商品：\n\n";
    cart.forEach((item, i) => msg += `${i+1}. [${item.sheet}] ${item.name} - $${item.price}\n`);
    msg += `\n總計金額：${document.getElementById('cart-total').textContent}`;
    window.location.href = CONFIG.LINE_MSG_URL + encodeURIComponent(msg);
  }

  function initDrag() {
    const el = document.getElementById('cart-trigger');
    let isD = false, sx, sy, ix, iy;
    const start = e => { 
      isD = false; 
      const t = e.touches ? e.touches[0] : e; 
      sx = t.clientX; sy = t.clientY; 
      const r = el.getBoundingClientRect(); 
      ix = r.left; iy = r.top; 
      document.addEventListener('mousemove', m); 
      document.addEventListener('touchmove', m, {passive:false}); 
      document.addEventListener('mouseup', end); 
      document.addEventListener('touchend', end); 
    };
    const m = e => { 
      const t = e.touches ? e.touches[0] : e; 
      const dx = t.clientX - sx, dy = t.clientY - sy; 
      if(Math.abs(dx)>5 || Math.abs(dy)>5){ 
        isD = true; 
        el.style.left = (ix+dx)+'px'; 
        el.style.top = (iy+dy)+'px'; 
        el.style.right='auto'; 
      } 
    };
    const end = () => { 
      document.removeEventListener('mousemove', m); 
      document.removeEventListener('touchmove', m);
      if(isD){ 
        const r = el.getBoundingClientRect(); 
        if(r.left+r.width/2 < window.innerWidth/2) el.style.left='15px'; 
        else { el.style.left='auto'; el.style.right='15px'; } 
      } 
    };
    el.addEventListener('mousedown', start); 
    el.addEventListener('touchstart', start);
    el.addEventListener('click', () => { if(!isD) toggleCart(true); });
  }

  init();
</script>
</body>
</html>
