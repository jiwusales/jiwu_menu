<script>
document.documentElement.style.setProperty('--theme-color', CONFIG.THEME_COLOR);
document.documentElement.style.setProperty('--active-color', CONFIG.ACTIVE_COLOR);
document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;

let allItems = [];
let allGroups = [];
let selectedGroup = null;
let groupMeta = {};
let cart = JSON.parse(localStorage.getItem('jiwu_cart')) || [];

function toggleMenu(open) {
  document.getElementById('side-menu').classList.toggle('open', open);
  document.getElementById('menu-overlay').style.display = open ? 'block' : 'none';
}

function saveCart() {
  localStorage.setItem('jiwu_cart', JSON.stringify(cart));
}

async function fetchSheetNames() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json`;
  const txt = await fetch(url).then(r => r.text());
  const json = JSON.parse(txt.substr(47).slice(0, -2));
  return json.table.rows.map(r => r.c?.[0]?.v).filter(Boolean);
}

async function fetchSheetData(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const txt = await fetch(url).then(r => r.text());
  return JSON.parse(txt.substr(47).slice(0, -2));
}

async function loadData() {
  try {
    const sheetNames = await fetchSheetNames();
    let tempItems = [];

    for (const sheetName of sheetNames) {
      const data = await fetchSheetData(sheetName);
      const rows = data.table.rows || [];

      const getCell = (r, c) => rows[r]?.c?.[c]?.v?.toString().trim() || "";

      const banner = getCell(1, 0);
      const color = getCell(1, 1) || CONFIG.THEME_COLOR;

      groupMeta[sheetName] = { banner, color };

      rows.slice(3).forEach(r => {
        const getV = (idx) => {
          const val = r.c?.[idx]?.v;
          return (val !== null && val !== undefined) ? val.toString().trim() : "";
        };

        const item = {
          group: sheetName,
          role: getV(0),
          type: getV(1),
          name: getV(2),
          originalPrice: getV(3),
          price: getV(4),
          stock: getV(5),
          img: getV(6) || "https://i.postimg.cc/bv5xRs04/image.png",
          url: getV(7),
          note: getV(8)
        };

        if (item.name) tempItems.push(item);
      });
    }

    allItems = tempItems;
    allGroups = [...new Set(allItems.map(i => i.group))];
    selectedGroup = allGroups[0] || null;

    renderSideMenu();
    switchGroup(selectedGroup);
    updateCartUI();
  } catch (e) {
    console.error(e);
    document.getElementById('card-container').innerHTML = "載入失敗。";
  }
}

function renderSideMenu() {
  const menu = document.getElementById('side-menu-list');
  menu.innerHTML = allGroups.map(g => `
    <div class="menu-item" onclick="switchGroup('${g.replace(/'/g, "\\'")}')">${g}</div>
  `).join('');
}

function renderRoleNav() {
  const nav = document.getElementById('dynamic-nav');
  nav.innerHTML = allGroups.map(g => `
    <a class="${selectedGroup === g ? 'active-role' : ''}" onclick="switchGroup('${g.replace(/'/g, "\\'")}')">${g}</a>
  `).join('');
}

function switchGroup(groupName) {
  selectedGroup = groupName;
  const meta = groupMeta[groupName] || {};
  document.getElementById('group-banner').src = meta.banner || "";
  document.documentElement.style.setProperty('--theme-color', meta.color || CONFIG.THEME_COLOR);
  renderRoleNav();
  renderItems();
  toggleMenu(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderItems() {
  const container = document.getElementById('card-container');
  container.innerHTML = "";

  const filtered = allItems.filter(i => i.group === selectedGroup);
  const roles = [...new Set(filtered.map(i => i.role || "其他"))];

  if (filtered.length === 0) {
    container.innerHTML = "<div style='padding:40px;color:#999;'>目前還沒有這類的酷東西( ´･ᴗ･` )</div>";
    return;
  }

  roles.forEach(role => {
    const roleItems = filtered.filter(i => (i.role || "其他") === role);
    if (!roleItems.length) return;

    const div = document.createElement('div');
    div.className = 'type-divider';
    div.textContent = role;
    container.appendChild(div);

    const grid = document.createElement('div');
    grid.className = 'group-grid';
    roleItems.forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  });
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';

  let tagText = "需預訂";
  let tagBg = "#C197D2";
  let tagColor = "white";

  if (!isNaN(parseFloat(item.stock)) && parseFloat(item.stock) > 0) {
    tagText = "有庫存";
    tagBg = "#FFF4BD";
    tagColor = "#333";
  }

  const p = item.price === '-' ? "組合出售" :
    (!item.price ? "私訊花花" :
    (/^[0-9]+$/.test(item.price.toString().trim()) ? `$${item.price}` : item.price));

  card.innerHTML = `
    <div class="stock-tag" style="background:${tagBg};color:${tagColor};">${tagText}</div>
    <div class="add-btn-tag">＋</div>
    <img src="${item.img}">
    <div class="name">${formatName(item.name)}</div>
    <div class="price">${p}</div>
  `;

  card.querySelector('.add-btn-tag').onclick = (e) => addToCart(e, item, tagText, tagBg, tagColor);
  card.onclick = () => zoomCard(card);
  return card;
}

function formatName(n) {
  return n && n.length > 9 ? n.slice(0, 9) + "<br>" + n.slice(9) : n;
}

function zoomCard(c) {
  const ov = document.createElement('div');
  ov.className = 'card-overlay';
  const clone = c.cloneNode(true);
  ov.appendChild(clone);
  ov.onclick = () => ov.remove();
  document.body.appendChild(ov);
}

function addToCart(e, item, tagText, tagBg, tagColor) {
  e.stopPropagation();
  cart.push({ ...item, currentStatus: tagText, tagBg, tagColor });
  saveCart();
  updateCartUI();
}

function clearCart() {
  if (confirm("確定要清空購物車嗎？")) {
    cart = [];
    saveCart();
    updateCartUI();
  }
}

function toggleCart(isOpen) {
  const panel = document.getElementById('cart-panel');
  const bg = document.getElementById('cart-overlay-bg');
  if (isOpen) {
    panel.classList.add('open');
    bg.style.display = 'block';
  } else {
    panel.classList.remove('open');
    bg.style.display = 'none';
  }
}

function updateCartUI() {
  const list = document.getElementById('cart-list');
  const badge = document.getElementById('cart-badge');
  const totalEl = document.getElementById('cart-total');
  list.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    let displayPrice = item.price;
    if (item.price === '-') displayPrice = "組合出售";
    else if (!item.price) displayPrice = "私訊花花";
    else displayPrice = `$${item.price}`;

    total += parseInt(item.price?.toString().replace(/[^0-9]/g, '')) || 0;

    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <img src="${item.img}">
      <div class="cart-item-info">
        <div class="cart-tag" style="background:${item.tagBg};color:${item.tagColor}">${item.currentStatus}</div>
        <div style="font-weight:bold;margin-bottom:2px;">${item.name}</div>
        <div style="color:#e44d26;font-weight:bold;">${displayPrice}</div>
      </div>
      <span style="cursor:pointer;color:#ccc;padding:5px;" onclick="removeFromCart(${index})">✕</span>
    `;
    list.appendChild(div);
  });

  badge.textContent = cart.length;
  badge.style.display = cart.length ? "flex" : "none";
  totalEl.textContent = `$${total}`;
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  updateCartUI();
  if (document.getElementById('checkout-modal').style.display === "flex") renderCheckoutSummary();
}

function generateLineMessage(lineName = "", igAccount = "") {
  let msg = "你好，我想詢問跟購買以下寶寶(৹˙꒳​˙ฅ)：\n\n";
  let total = 0;

  cart.forEach((item, i) => {
    const priceVal = parseInt(item.price?.toString().replace(/[^0-9]/g, '')) || 0;
    let linePrice = `$${item.price}`;
    if (item.price === '-') linePrice = "詢問組合";
    else if (!item.price) linePrice = "詢問報價";

    msg += `${i + 1}. (${item.currentStatus}) ${item.name} ${linePrice}\n`;
    total += priceVal;
  });

  msg += `\n總金額：$${total}`;
  if (lineName || igAccount) {
    msg += "\n\n--------------------------";
    if (lineName) msg += `\nLINE：${lineName}`;
    if (igAccount) msg += `\nIG：${igAccount}`;
  }
  return encodeURIComponent(msg);
}

function handleCheckoutEntry() {
  if (cart.length === 0) return alert("購物車是空的唷！");
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile) {
    const msg = generateLineMessage();
    window.location.href = CONFIG.LINE_MSG_URL + msg;
    setTimeout(() => {
      cart = [];
      saveCart();
      updateCartUI();
      toggleCart(false);
    }, 1500);
  } else {
    openCheckoutModal();
  }
}

function openCheckoutModal() {
  toggleCart(false);
  document.getElementById('step-1').style.display = "block";
  document.getElementById('step-2').style.display = "none";
  renderCheckoutSummary();
  document.getElementById('checkout-modal').style.display = "flex";
}

function renderCheckoutSummary() {
  const summaryList = document.getElementById('modal-summary-list');
  const totalEl = document.getElementById('modal-total-price');
  summaryList.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    let displayPrice = item.price === '-' ? "組合出售" : (!item.price ? "私訊花花" : `$${item.price}`);
    total += parseInt(item.price?.toString().replace(/[^0-9]/g, '')) || 0;

    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <img src="${item.img}">
      <div class="cart-item-info">
        <div class="cart-tag" style="background:${item.tagBg};color:${item.tagColor}">${item.currentStatus}</div>
        <div style="font-weight:bold;margin-bottom:2px;">${item.name}</div>
        <div style="color:#e44d26;font-weight:bold;">${displayPrice}</div>
      </div>
    `;
    summaryList.appendChild(div);
  });

  totalEl.textContent = `$${total}`;
}

function closeModal() {
  document.getElementById('checkout-modal').style.display = "none";
}

async function handleFinalCheckout() {
  const lineName = document.getElementById('user-line').value.trim();
  const igAcc = document.getElementById('user-ig').value.trim();

  if (!lineName) {
    alert("請輸入LINE名稱方便核對 ദ്ദി(⩌ᴗ⩌ )");
    return;
  }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = "傳送中 ᓫ(๑º꒳º๑)ꜝꜝ";

  try {
    const cartData = cart.map(item => ({
      group: item.group,
      role: item.role,
      type: item.type,
      name: item.name,
      price: item.price,
      status: item.currentStatus
    }));

    await fetch(CONFIG.DEPLOY_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        source: "電腦",
        lineName,
        igAccount: igAcc,
        cartItems: cartData
      })
    });
  } catch (e) {
    console.error(e);
  }

  cart = [];
  saveCart();
  updateCartUI();
  document.getElementById('step-1').style.display = "none";
  document.getElementById('step-2').style.display = "block";
}

(function initDraggableCart() {
  const el = document.getElementById('cart-trigger');
  let isDragging = false, startX, startY, initialX, initialY;

  const dragStart = (e) => {
    isDragging = false;
    el.style.transition = 'none';
    const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
    startX = clientX;
    startY = clientY;
    const rect = el.getBoundingClientRect();
    initialX = rect.left;
    initialY = rect.top;

    document.addEventListener('mousemove', dragMove);
    document.addEventListener('touchmove', dragMove, { passive: false });
    document.addEventListener('mouseup', dragEnd);
    document.addEventListener('touchend', dragEnd);
  };

  const dragMove = (e) => {
    const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
    const dx = clientX - startX, dy = clientY - startY;

    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      isDragging = true;
      if (e.cancelable) e.preventDefault();
      el.style.left = (initialX + dx) + 'px';
      el.style.top = (initialY + dy) + 'px';
      el.style.right = 'auto';
    }
  };

  const dragEnd = () => {
    document.removeEventListener('mousemove', dragMove);
    document.removeEventListener('touchmove', dragMove);
    document.removeEventListener('mouseup', dragEnd);
    document.removeEventListener('touchend', dragEnd);

    if (isDragging) {
      el.style.transition = 'left 0.3s ease, right 0.3s ease, top 0.3s ease';
      const rect = el.getBoundingClientRect();
      const screenWidth = window.innerWidth;

      if (rect.left + rect.width / 2 < screenWidth / 2) el.style.left = '10px';
      else el.style.left = (screenWidth - rect.width - 10) + 'px';

      if (rect.top < 50) el.style.top = '50px';
      if (rect.top > window.innerHeight - 60) el.style.top = (window.innerHeight - 60) + 'px';
    }
  };

  el.addEventListener('click', (e) => {
    if (isDragging) e.preventDefault();
    else toggleCart(true);
  });

  el.addEventListener('mousedown', dragStart);
  el.addEventListener('touchstart', dragStart, { passive: false });
})();

loadData();
</script>
