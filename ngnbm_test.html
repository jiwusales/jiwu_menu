<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物寶寶目錄</title>

  <meta property="og:title" content="JIWU吉物寶寶目錄" />
  <meta property="og:description" content="官LINE請搜尋（@jiwusales）" />
  <meta property="og:image" content="https://i.postimg.cc/3R7nNT0k/icon.png" />
  <meta property="og:type" content="website" />

  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  
  <script>
    const CONFIG = {
      // --- 只需要修改這裡 ---
      THEME_COLOR: "#90ADC6", // 整體主色調 (標題列、邊框)
      ACTIVE_COLOR: "#f5b080", // 選中狀態顏色 (導覽文字、勾選框)
      SHEET_NAME: "ナガノ", // 試算表分頁名稱
      // ---------------------
      SHEET_ID: "1iCEqgnGGa_TVVbx90xNWxDzwKtz94VfqF8IsXRvpKMY", 
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！訂購找花花 (৹˙꒳˙ฅ )",
      FAVICON: "https://i.postimg.cc/3R7nNT0k/icon.png",
      LINE_ID: "@jiwusales", 
      LINE_LINK: "https://line.me/R/ti/p/@tei8245t",
      LINE_MSG_URL: "https://line.me/R/oaMessage/@tei8245t/?",
      DEPLOY_URL: "https://script.google.com/macros/s/AKfycbzEaZqaGT4HU2sWDUIiBLQ2TljlaW4YCeupcd_yVf0AlboFATxXSKpkwUwfUWbTuovGKA/exec"
    };
  </script>

  <style>
    :root { 
      --theme-color: #FBCC7E; 
      --active-color: #f5b080; 
      --nav-bg: #f9f9f9; 
      --text-color: #333333; 
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    .top-bar { background: var(--theme-color); color: #fff; padding: 10px 0; position: fixed; top: 0; left: 0; width: 100%; z-index: 999; font-size: 15px; }
    .top-bar .pulse-text { display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 38px; border-bottom: 1px solid #f0f0f0; }
    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .nav-bar { display: inline-block; padding: 8px 0; font-size: 10pt; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 0; display: inline-block; transition: 0.2s; cursor: pointer; }
    .nav-bar a.active-role { color: var(--active-color); font-weight: bold; }
    .nav-bar a::after { content: "｜"; color: #aaa; margin: 0 2px; font-weight: normal; }
    .nav-bar a:last-child::after { content: ""; }

    .filter-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 30px; background: #fff; }
    .filter-item { display: inline-flex; align-items: center; margin: 0 4px; font-size: 12px; cursor: pointer; color: #666; vertical-align: middle; transition: color 0.2s; }
    .filter-item.active { color: var(--active-color); font-weight: bold; }
    .filter-item input { margin-right: 3px; cursor: pointer; accent-color: var(--active-color); transform: scale(0.8); }

    .nav-arrow { width: 24px; font-size: 16px; cursor: pointer; flex-shrink: 0; user-select: none; color: #bbb; display: flex; justify-content: center; align-items: center; }

    #card-container { padding: 115px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    .type-divider { display: flex; align-items: center; justify-content: center; margin: 15px 0 8px; font-weight: bold; scroll-margin-top: 120px; color: var(--text-color); font-size: 16px; }
    .type-divider::before, .type-divider::after { content: ""; flex: 1; border-top: 1px solid #ddd; margin: 0 10px; }
    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); justify-content: start; gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
    
    .stock-tag { position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; }
    .stock-tag.vertical { writing-mode: vertical-rl; text-orientation: upright; width: 20px; height: auto; border-radius: 10px; padding: 4px 0; font-size: 9px; }
    
    .add-btn-tag { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%; background: #ddd; color: #fff; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; cursor: pointer; pointer-events: auto; }

    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto 0px; object-fit: contain; pointer-events: none; }
    .card .name { margin: 1px auto; font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; }
    .card .price { font-size: 10px; margin: 1px auto 5px; color: #666; }
    
    /* 購物車面板相關樣式 */
    #cart-trigger { position: fixed; top: 115px; right: 15px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; opacity: 0.8; cursor: move; touch-action: none; }
    #cart-trigger img { width: 28px; height: 28px; pointer-events: none; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; font-weight: bold; }
    #cart-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }
    .cart-header { padding: 12px 15px; background: var(--theme-color); color: white; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
    .cart-list { flex: 1; overflow-y: auto; padding: 10px; text-align: left; }
    .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; font-size: 12px; }
    .cart-item img { width: 45px; height: 45px; object-fit: contain; }
    .cart-footer { padding: 15px; border-top: 1px solid #eee; background: #fafafa; }
    .btn-checkout { background: var(--theme-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    /* 彈窗樣式 */
    #checkout-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-content { background: white; width: 85%; max-width: 380px; border-radius: 15px; padding: 20px; position: relative; }
    .input-box { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="top-bar"><a href="https://lin.ee/X6FUFI9" target="_blank" style="color: #fff; text-decoration: none;"><span class="pulse-text" id="top-msg">載入中...</span></a></div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="role-scroll"><div class="nav-bar" id="dynamic-nav"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(150,0)">❯</div>
    </div>
    <div class="filter-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="filter-scroll"><div id="filter-bar" style="display: inline-block;"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(150,0)">❯</div>
    </div>
  </div>

  <div id="card-container"></div>

  <div id="cart-trigger">
    <img src="https://images.icon-icons.com/2098/PNG/512/shopping_cart_icon_128753.png" alt="cart">
    <div id="cart-badge">0</div>
  </div>

  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header">
      <span>購物車</span>
      <span style="cursor:pointer;" onclick="toggleCart(false)">✕</span>
    </div>
    <div class="cart-list" id="cart-list"></div>
    <div class="cart-footer">
      <div style="margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between;">
        <span>總計金額</span>
        <span id="cart-total" style="color: #e44d26;">$0</span>
      </div>
      <button class="btn-checkout" onclick="handleCheckoutEntry()">確認結帳</button>
    </div>
  </div>

<script>
// 初始化設定
document.documentElement.style.setProperty('--theme-color', CONFIG.THEME_COLOR);
document.documentElement.style.setProperty('--active-color', CONFIG.ACTIVE_COLOR);
document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;

let allItems = [], allCategories = [], allTypes = [], selectedTypes = [], selectedRole = null;
let cart = JSON.parse(localStorage.getItem('jiwu_cart')) || [];

function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
  fetch(url).then(r => r.text()).then(t => {
    try {
      const data = JSON.parse(t.substr(47).slice(0,-2));
      allItems = data.table.rows.map(r => {
        const getV = (idx) => r.c[idx]?.v?.toString().trim() || "";
        return {
          kind: getV(0) || "其他角色",
          type: getV(1) || "其他",
          name: getV(3),       
          price: r.c[5]?.v,    
          colStock: getV(6),   
          colShop: getV(7),    
          colNonStock: getV(8),
          colList: getV(9),    
          colOrder: getV(10),  
          img: getV(12) || "https://i.postimg.cc/bv5xRs04/image.png" 
        };
      }).filter(item => item.colList === "" && item.colStock.toLowerCase() !== 'x');

      allCategories = [...new Set(allItems.map(i => i.kind))];
      allTypes = [...new Set(allItems.map(i => i.type))];
      renderRoleNav();
      renderFilters();
      renderItems();
      updateCartUI();
    } catch (e) { console.error(e); }
  });
}

function renderItems() {
  const container = document.getElementById('card-container');
  container.innerHTML = "";
  let filteredItems = selectedTypes.length > 0 ? allItems.filter(i => selectedTypes.includes(i.type)) : allItems;
  if (selectedRole) filteredItems = filteredItems.filter(i => i.kind === selectedRole);

  if (!selectedTypes.length && !selectedRole) {
    allCategories.forEach(cat => {
      const catItems = filteredItems.filter(i => i.kind === cat);
      if (catItems.length === 0) return;
      const div = document.createElement('div');
      div.className = 'type-divider'; div.textContent = cat;
      container.appendChild(div);
      const grid = document.createElement('div'); grid.className = 'group-grid';
      catItems.forEach(item => grid.appendChild(createCard(item)));
      container.appendChild(grid);
    });
  } else {
    const grid = document.createElement('div'); grid.className = 'group-grid';
    filteredItems.forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  }
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  // 角色邊框已統一使用 CONFIG.THEME_COLOR (透過 CSS :root)

  let tagText = "", tagBg = "#fab460", tagColor = "white";
  if (item.colOrder !== "") { tagText = "受注"; tagBg = "#B1DEC1"; } 
  else if (item.colStock === "" && item.colShop === "") { tagText = "點名中"; tagBg = "#D2EAF1"; tagColor = "#333"; }
  else if (item.colStock === "0" && parseFloat(item.colNonStock) > 0) { tagText = "搭機中"; tagBg = "#6C95B0"; }
  else if (item.colStock === "0" && (item.colShop === "0" || item.colShop === "")) { tagText = "需預訂"; tagBg = "#C197D2"; }
  else if (parseFloat(item.colStock) > 0 || parseFloat(item.colShop) > 0) { tagText = "現貨"; tagBg = "#FFF4BD"; tagColor = "#333"; }

  const tagHtml = tagText ? `<div class="stock-tag ${tagText.length >= 2 ? "vertical" : ""}" style="background-color:${tagBg}; color:${tagColor};">${tagText}</div>` : "";
  const addBtnHtml = `<div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')}, '${tagText}', '${tagBg}', '${tagColor}')">＋</div>`;
  const p = item.price === '-' ? "組合出售" : (!item.price ? "私訊花花" : `$${item.price}`);
  
  card.innerHTML = `${tagHtml}${addBtnHtml}<img src="${item.img}"><div class="name">${item.name}</div><div class="price">${p}</div>`;
  card.onclick = () => {
    const ov = document.createElement('div'); ov.style = "position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:10000;display:flex;align-items:center;justify-content:center;";
    const img = document.createElement('img'); img.src = item.img; img.style = "max-width:90%;max-height:80%;";
    ov.appendChild(img); ov.onclick = () => ov.remove(); document.body.appendChild(ov);
  };
  return card;
}

// 導覽列與過濾器邏輯
function renderRoleNav() {
  const nav = document.getElementById('dynamic-nav');
  nav.innerHTML = allCategories.map(cat => `<a class="${selectedRole === cat ? 'active-role' : ''}" onclick="toggleRole('${cat}')">${cat}</a>`).join('');
}
function toggleRole(cat) { selectedRole = (selectedRole === cat) ? null : cat; window.scrollTo(0,0); renderRoleNav(); renderItems(); }
function renderFilters() {
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = allTypes.map(t => `<label class="filter-item ${selectedTypes.includes(t) ? 'active' : ''}"><input type="checkbox" ${selectedTypes.includes(t) ? 'checked' : ''} onchange="toggleType('${t}')">${t}</label>`).join('');
}
function toggleType(type) {
  selectedTypes = selectedTypes.includes(type) ? selectedTypes.filter(t => t !== type) : [...selectedTypes, type];
  window.scrollTo(0,0); renderFilters(); renderItems();
}

// 購物車功能
function addToCart(e, item, tagText, tagBg, tagColor) {
  e.stopPropagation();
  cart.push({ ...item, currentStatus: tagText || "商品", tagBg: tagBg, tagColor: tagColor });
  localStorage.setItem('jiwu_cart', JSON.stringify(cart));
  updateCartUI();
}
function updateCartUI() {
  const list = document.getElementById('cart-list');
  const badge = document.getElementById('cart-badge');
  const totalEl = document.getElementById('cart-total');
  list.innerHTML = ""; let total = 0;
  cart.forEach((item, index) => {
    total += (parseInt(item.price) || 0);
    const div = document.createElement('div'); div.className = 'cart-item';
    div.innerHTML = `<img src="${item.img}"><div><b>${item.name}</b><br>$${item.price}</div><span style="margin-left:auto;cursor:pointer;color:#ccc" onclick="cart.splice(${index},1);updateCartUI();localStorage.setItem('jiwu_cart', JSON.stringify(cart));">✕</span>`;
    list.appendChild(div);
  });
  badge.textContent = cart.length; badge.style.display = cart.length ? "flex" : "none";
  totalEl.textContent = `$${total}`;
}
function toggleCart(isOpen) { document.getElementById('cart-panel').classList.toggle('open', isOpen); document.getElementById('cart-overlay-bg').style.display = isOpen ? 'block' : 'none'; }
function handleCheckoutEntry() {
  if (!cart.length) return alert("購物車空空的唷！");
  let msg = "你好，我想詢問以下商品：\n" + cart.map((i, idx) => `${idx+1}. (${i.currentStatus}) ${i.name} $${i.price}`).join("\n");
  window.location.href = CONFIG.LINE_MSG_URL + encodeURIComponent(msg);
}

loadData();
</script>
</body>
</html>
