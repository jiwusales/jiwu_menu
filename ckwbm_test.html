<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JIWU吉物寶寶目錄</title>
  <link rel="icon" href="https://i.postimg.cc/3R7nNT0k/icon.png" type="image/png" />
  
  <script>
    const CONFIG = {
      THEME_COLOR: "#FBCC7E",
      ACTIVE_COLOR: "#f5b080",
      SHEET_ID: "1iCEqgnGGa_TVVbx90xNWxDzwKtz94VfqF8IsXRvpKMY", 
      SHEET_NAME: "ちいかわ",                                
      TOP_BAR_TEXT: "點擊卡片可放大圖片唷！訂購找花花 (৹˙꒳˙ฅ )",
      FAVICON: "https://i.postimg.cc/3R7nNT0k/icon.png",
      LINE_LINK: "https://lin.ee/X6FUFI9" 
    };
  </script>

  <style>
    :root { 
      --theme-color: #FBCC7E; 
      --active-color: #f5b080; 
      --nav-bg: #f9f9f9; 
      --text-color: #333333; 
    }

    body { font-family: Arial, sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; color: var(--text-color); text-align: center; overflow-x: hidden; }
    .top-bar { background: var(--theme-color); color: #fff; padding: 10px 0; position: fixed; top: 0; left: 0; width: 100%; z-index: 999; font-size: 15px; }
    .top-bar .pulse-text { display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .header-fixed { position: fixed; top: 40px; width: 100%; background: var(--nav-bg); z-index: 998; border-bottom: 1px solid #eee; }
    .nav-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 38px; border-bottom: 1px solid #f0f0f0; }
    .scroll-container { flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .nav-bar { display: inline-block; padding: 8px 0; font-size: 10pt; }
    .nav-bar a { color: var(--text-color); text-decoration: none; padding: 6px 0; display: inline-block; transition: 0.2s; cursor: pointer; }
    .nav-bar a.active-role { color: var(--active-color); font-weight: bold; }
    .nav-bar a::after { content: "｜"; color: #aaa; margin: 0 2px; font-weight: normal; }
    .nav-bar a:last-child::after { content: ""; }

    .filter-bar-wrapper { display: flex; align-items: center; padding: 0 5px; box-sizing: border-box; height: 30px; background: #fff; }
    .filter-item { display: inline-flex; align-items: center; margin: 0 4px; font-size: 12px; cursor: pointer; color: #666; vertical-align: middle; transition: color 0.2s; }
    .filter-item.active { color: var(--active-color); font-weight: bold; }
    .filter-item input { margin-right: 3px; cursor: pointer; accent-color: var(--active-color); transform: scale(0.8); }

    .nav-arrow { width: 24px; font-size: 16px; cursor: pointer; flex-shrink: 0; user-select: none; color: #bbb; display: flex; justify-content: center; align-items: center; }

    #card-container { padding: 115px 10px 10px; display: flex; flex-direction: column; gap: 8px; }
    .type-divider { display: flex; align-items: center; justify-content: center; margin: 15px 0 8px; font-weight: bold; scroll-margin-top: 160px; color: var(--text-color); font-size: 16px; }
    .type-divider::before, .type-divider::after { content: ""; flex: 1; border-top: 1px solid #ddd; margin: 0 10px; }
    .group-grid { display: grid; grid-template-columns: repeat(4, 1fr); justify-content: start; gap: 6px; }
    @media (min-width: 480px) { .group-grid { grid-template-columns: repeat(auto-fill, 120px); } }
    
    .card { border: 2px solid var(--theme-color); border-radius: 8px; background: #fff; text-align: center; cursor: pointer; overflow: hidden; transition: 0.2s; position: relative; }
    
    .stock-tag, .add-btn-tag { position: absolute; top: 4px; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; }
    .stock-tag { left: 4px; }
    .stock-tag.vertical { writing-mode: vertical-rl; text-orientation: upright; width: 20px; height: auto; border-radius: 10px; padding: 4px 0; font-size: 9px; }
    
    .add-btn-tag { right: 4px; background: #ddd; color: #fff; font-size: 16px; cursor: pointer; pointer-events: auto; }

    .card img { height: 90px; width: auto; max-width: 90%; display: block; margin: 5px auto 0px; object-fit: contain; pointer-events: none; }
    .card .name { margin: 1px auto; font-size: 9px; font-weight: bold; line-height: 1.2; padding: 0 2px; }
    .card .price { font-size: 10px; margin: 1px auto 5px; color: #666; }
    
    /* 修改 4：放大後的標籤縮小 60% */
    .card-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .card-overlay .card { transform: scale(3.2); background: white; width: 120px; pointer-events: none; border-width: 1.5px; }
    .card-overlay .stock-tag, .card-overlay .add-btn-tag { transform: scale(0.4); transform-origin: center; }

    #cart-trigger { position: fixed; top: 115px; right: 15px; width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 999; opacity: 0.7; cursor: pointer; }
    #cart-trigger img { width: 28px; height: 28px; }
    #cart-badge { position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; font-weight: bold; }

    #cart-panel { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 1001; transition: 0.3s ease; display: flex; flex-direction: column; }
    #cart-panel.open { right: 0; }
    #cart-overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; }

    /* 修改 2：標題高度、文字與顏色更新 */
    .cart-header { padding: 12px 15px; background: #b8a597; color: white; font-weight: bold; font-size: 16px; text-align: left; display: flex; justify-content: space-between; align-items: center; }
    
    .cart-list { flex: 1; overflow-y: auto; padding: 10px; text-align: left; }
    .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; font-size: 12px; }
    .cart-item img { width: 45px; height: 45px; object-fit: contain; border-radius: 4px; }
    .cart-item-info { flex: 1; }
    .cart-footer { padding: 15px 15px 25px; border-top: 1px solid #eee; background: #fafafa; }
    
    /* 修改 1：清空文字對齊左邊並加大 */
    .text-clear { display: block; text-align: left; color: #aaa; font-size: 13px; text-decoration: underline; cursor: pointer; margin-bottom: 12px; font-weight: normal; }
    .text-clear:hover { color: #888; }
    
    .btn-checkout { background: #b8a597; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>
  <div class="top-bar"><a href="https://lin.ee/X6FUFI9" target="_blank" style="color: #fff; text-decoration: none;"><span class="pulse-text" id="top-msg">載入中...</span></a></div>

  <div class="header-fixed">
    <div class="nav-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="role-scroll"><div class="nav-bar" id="dynamic-nav"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('role-scroll').scrollBy(150,0)">❯</div>
    </div>
    <div class="filter-bar-wrapper">
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(-150,0)">❮</div>
      <div class="scroll-container" id="filter-scroll"><div id="filter-bar" style="display: inline-block;"></div></div>
      <div class="nav-arrow" onclick="document.getElementById('filter-scroll').scrollBy(150,0)">❯</div>
    </div>
  </div>

  <div id="card-container"></div>

  <div id="cart-trigger" onclick="toggleCart(true)">
    <img src="https://images.icon-icons.com/2098/PNG/512/shopping_cart_icon_128753.png" alt="cart">
    <div id="cart-badge">0</div>
  </div>

  <div id="cart-overlay-bg" onclick="toggleCart(false)"></div>
  <div id="cart-panel">
    <div class="cart-header">
      <span>購物車</span>
      <span style="cursor:pointer; font-size: 20px;" onclick="toggleCart(false)">✕</span>
    </div>
    <div class="cart-list" id="cart-list"></div>
    <div class="cart-footer">
      <span class="text-clear" onclick="clearCart()">清空購物車</span>
      
      <div style="margin-bottom:12px; font-weight:bold; display:flex; justify-content:space-between; font-size:15px;">
        <span>總計金額</span>
        <span id="cart-total" style="color: #e44d26;">$0</span>
      </div>
      <button class="btn-checkout" onclick="checkoutLine()">到官LINE結帳</button>
    </div>
  </div>

<script>
document.documentElement.style.setProperty('--theme-color', CONFIG.THEME_COLOR);
document.documentElement.style.setProperty('--active-color', CONFIG.ACTIVE_COLOR);
document.getElementById('top-msg').textContent = CONFIG.TOP_BAR_TEXT;

let allItems = [], allCategories = [], allTypes = [], selectedTypes = [], selectedRole = null;
let cart = JSON.parse(localStorage.getItem('jiwu_cart')) || [];

function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
  fetch(url).then(r => r.text()).then(t => {
    try {
      const data = JSON.parse(t.substr(47).slice(0,-2));
      allItems = data.table.rows.map(r => {
        const getV = (idx) => {
          const val = r.c[idx]?.v;
          return (val !== null && val !== undefined) ? val.toString().trim() : "";
        };
        return {
          kind: getV(0) || "其他角色",
          type: getV(1) || "其他",
          name: getV(3),
          price: r.c[5]?.v,
          colG: getV(6),
          colH: getV(7),
          colI: getV(8),
          colJ: getV(9),
          colK: getV(10),
          img: getV(12) || "https://i.postimg.cc/bv5xRs04/image.png"
        };
      }).filter(item => item.colJ === "" && item.colG.toLowerCase() !== 'x');

      allCategories = [...new Set(allItems.map(i => i.kind))];
      allTypes = [...new Set(allItems.map(i => i.type))];
      renderRoleNav();
      renderFilters();
      renderItems();
      updateCartUI();
    } catch (e) { document.getElementById('card-container').innerHTML = "載入失敗。"; }
  });
}

function saveCart() {
  localStorage.setItem('jiwu_cart', JSON.stringify(cart));
}

// 修改 3：＋號點擊後變色維持 6 秒
function addToCart(e, item, tagText) {
  e.stopPropagation();
  cart.push({...item, tagText: tagText || "商品"});
  saveCart();
  updateCartUI();
  const btn = e.target;
  const originalBg = "#ddd";
  btn.style.background = "#fdd365";
  setTimeout(() => { btn.style.background = originalBg; }, 6000); 
}

function clearCart() {
  if (confirm("確定要清空購物車嗎？")) {
    cart = [];
    saveCart();
    updateCartUI();
  }
}

function toggleCart(isOpen) {
  const panel = document.getElementById('cart-panel');
  const bg = document.getElementById('cart-overlay-bg');
  if(isOpen) {
    panel.classList.add('open');
    bg.style.display = 'block';
  } else {
    panel.classList.remove('open');
    bg.style.display = 'none';
  }
}

function updateCartUI() {
  const list = document.getElementById('cart-list');
  const badge = document.getElementById('cart-badge');
  const totalEl = document.getElementById('cart-total');
  list.innerHTML = "";
  let total = 0;
  cart.forEach((item, index) => {
    const priceVal = parseInt(item.price.toString().replace(/[^0-9]/g, '')) || 0;
    total += priceVal;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<img src="${item.img}"><div class="cart-item-info"><div style="font-weight:bold; margin-bottom:2px;">[${item.tagText}]</div><div>${item.name}</div><div style="color:#e44d26; font-weight:bold; margin-top:2px;">$${item.price}</div></div><span style="cursor:pointer; color:#ccc; padding:5px;" onclick="removeFromCart(${index})">✕</span>`;
    list.appendChild(div);
  });
  badge.textContent = cart.length;
  badge.style.display = cart.length > 0 ? "flex" : "none";
  totalEl.textContent = `$${total}`;
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  updateCartUI();
}

// 修改 5：優化 LINE 訊息傳送邏輯
function checkoutLine() {
  if (cart.length === 0) return alert("購物車是空的唷！");
  let msg = "您好，我想要購買以下商品：\n\n";
  let total = 0;
  cart.forEach((item, i) => {
    msg += `${i+1}. [${item.tagText}] ${item.name} - $${item.price}\n`;
    const priceVal = parseInt(item.price.toString().replace(/[^0-9]/g, '')) || 0;
    total += priceVal;
  });
  msg += `\n總計金額：$${total}`;
  
  const finalLink = CONFIG.LINE_LINK.includes('?') 
    ? `${CONFIG.LINE_LINK}&text=${encodeURIComponent(msg)}` 
    : `${CONFIG.LINE_LINK}?text=${encodeURIComponent(msg)}`;
    
  window.open(finalLink, '_blank');
}

function renderRoleNav() {
  const nav = document.getElementById('dynamic-nav');
  nav.innerHTML = allCategories.map(cat => {
    const isSelected = selectedRole === cat;
    return `<a class="${isSelected ? 'active-role' : ''}" onclick="toggleRole('${cat}')">${cat}</a>`;
  }).join('');
}

function toggleRole(cat) {
  selectedRole = (selectedRole === cat) ? null : cat;
  renderRoleNav();
  renderItems();
}

function renderFilters() {
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = allTypes.map(t => {
    const isActive = selectedTypes.includes(t);
    return `<label class="filter-item ${isActive ? 'active' : ''}"><input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleType('${t}')">${t}</label>`;
  }).join('');
}

function toggleType(type) {
  if (selectedTypes.includes(type)) { selectedTypes = selectedTypes.filter(t => t !== type); }
  else { selectedTypes.push(type); }
  renderFilters();
  renderItems();
}

function renderItems() {
  const container = document.getElementById('card-container');
  container.innerHTML = "";
  const isFilterMode = selectedTypes.length > 0;
  let filteredItems = isFilterMode ? allItems.filter(i => selectedTypes.includes(i.type)) : allItems;
  if (selectedRole) { filteredItems = filteredItems.filter(i => i.kind === selectedRole); }

  if (filteredItems.length === 0) {
    container.innerHTML = "<div style='padding: 40px; color: #999;'>目前還沒有這類的酷東西( ´･ᴗ･` )</div>";
    return;
  }

  if (!isFilterMode && !selectedRole) {
    allCategories.forEach(cat => {
      const catItems = filteredItems.filter(i => i.kind === cat);
      if (catItems.length === 0) return;
      const div = document.createElement('div');
      div.className = 'type-divider'; div.id = cat; div.textContent = cat;
      container.appendChild(div);
      const grid = document.createElement('div');
      grid.className = 'group-grid';
      catItems.forEach(item => grid.appendChild(createCard(item)));
      container.appendChild(grid);
    });
  } else {
    const grid = document.createElement('div');
    grid.className = 'group-grid';
    grid.style.paddingTop = "10px";
    filteredItems.forEach(item => grid.appendChild(createCard(item)));
    container.appendChild(grid);
  }
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  const roleColors = { "吉伊": "#d77485", "小八": "#6293b8", "兔兔": "#f9be3c", "小桃": "#838BC2", "師傅": "#CCAFA5", "栗子": "#94C973", "獅薩": "#FBAA60", "古本": "#eb9e97", "綜合角色": "#989FC0", "全角色": "#E24C60", "其他角色": "#45818e" };
  const borderColor = roleColors[item.kind] || CONFIG.THEME_COLOR;
  card.style.borderColor = borderColor;

  let tagText = "";
  let tagBg = "#fab460"; 
  let tagColor = "white";

  if (item.colK !== "") { tagText = "受注"; tagBg = "#B1DEC1"; } 
  else if (item.colG === "" && item.colH === "") { tagText = "點貨中"; tagBg = "#D2EAF1"; tagColor = "#666"; }
  else if (item.colG === "0" && parseFloat(item.colI) > 0) { tagText = "搭機中"; tagBg = "#6C95B0"; }
  else if (item.colG === "0" && (item.colH === "0" || item.colH === "") && (item.colI === "0" || item.colI === "")) { tagText = "需預訂"; tagBg = "#C197D2"; }
  else if (parseFloat(item.colG) > 0) { tagText = "現貨"; tagBg = "#fab460"; }

  let tagHtml = "";
  if (tagText) {
    const isVertical = tagText.length >= 2 ? "vertical" : "";
    tagHtml = `<div class="stock-tag ${isVertical}" style="background-color:${tagBg}; color:${tagColor};">${tagText}</div>`;
  }
  let addBtnHtml = `<div class="add-btn-tag" onclick="addToCart(event, ${JSON.stringify(item).replace(/"/g, '&quot;')}, '${tagText}')">＋</div>`;
  let p = item.price === '-' ? "組合出售" : (!item.price ? "私訊花花" : (/^[0-9]+$/.test(item.price.toString().trim()) ? `$${item.price}` : item.price));
  card.innerHTML = `${tagHtml}${addBtnHtml}<img src="${item.img}"><div class="name">${formatName(item.name)}</div><div class="price">${p}</div>`;
  card.onclick = () => zoomCard(card);
  return card;
}

function formatName(n) { return n && n.length > 9 ? n.slice(0, 9) + "<br>" + n.slice(9) : n; }
function zoomCard(c) {
  const ov = document.createElement('div'); ov.className = 'card-overlay';
  const clone = c.cloneNode(true); ov.appendChild(clone);
  ov.onclick = () => ov.remove(); document.body.appendChild(ov);
}
loadData();
</script>
</body>
</html>
